<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Painel Consultor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#fffdf5,#ffe8a3);
}

/* TOPO */
.topo{
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  color:#b8860b;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* TEXTOS */
.pergunta{font-size:14px;}
.user{font-size:12px;color:#777;margin-bottom:5px;}

/* INPUTS */
select,textarea{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-family:Poppins;
}

textarea{
  min-height:70px;
  resize:none;
}

/* BOTÕES */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:6px;
  font-weight:600;
  cursor:pointer;
}

.btn-resp{background:#ffd700;}
.btn-del{background:#ff4d4d;color:#fff;}

/* UPLOAD BONITO */
.upload{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.upload-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

input[type=file]{display:none;}

.preview{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
  display:none;
}

/* RESPOSTAS */
.respostas{
  margin-top:10px;
  border-top:1px solid #eee;
  padding-top:10px;
}

.resp-item{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.resp-item img{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

.resp-text{
  background:#f7f7f7;
  padding:8px;
  border-radius:8px;
  font-size:13px;
  width:100%;
}

.resp-img{
  width:100%;
  max-width:220px;
  margin-top:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="topo">Painel do Consultor</div>
<div class="container" id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CONSULTOR */
const consultores = [
["Pai Márcio","https://i.ibb.co/RGZzCfFC/Captura-de-tela-2026-04-02-001847.png"],
["Samya","https://i.ibb.co/m570rCkG/Whats-App-Image-2026-04-03-at-22-36-29-1.jpg"],
["Aislyn","https://i.ibb.co/5WtRK6mQ/Whats-App-Image-2026-04-03-at-22-36-29-2.jpg"]
];

const lista = document.getElementById("lista");

/* 🔥 LISTENER ESTÁVEL */
db.collection("perguntas").orderBy("data","desc")
.onSnapshot(snapshot=>{
  lista.innerHTML="";

  snapshot.forEach(doc=>{
    const d = doc.data();

    lista.innerHTML += `
    <div class="card">

      <div class="user">${d.nome}</div>
      <div class="pergunta">${d.pergunta}</div>

      <select id="c${doc.id}">
        ${consultores.map(c=>`<option value="${c[0]}|${c[1]}">${c[0]}</option>`).join("")}
      </select>

      <textarea id="r${doc.id}" placeholder="Digite sua resposta"></textarea>

      <div class="upload">
        <label class="upload-btn">
          📎
          <input type="file" id="img${doc.id}" onchange="preview('${doc.id}')">
        </label>
        <img id="p${doc.id}" class="preview">
      </div>

      <button class="btn-resp" onclick="responder('${doc.id}')">
        Enviar Resposta
      </button>

      <button class="btn-del" onclick="apagar('${doc.id}')">
        Excluir Pergunta
      </button>

      <div class="respostas">
        ${
          d.respostas ? d.respostas.map(r=>`
          <div class="resp-item">
            <img src="${r.foto}">
            <div class="resp-text">
              <b>${r.nome}</b><br>${r.texto}
              ${r.img ? `<img class="resp-img" src="${r.img}">` : ""}
            </div>
          </div>
          `).join("") : ""
        }
      </div>

    </div>
    `;
  });
});

/* PREVIEW */
function preview(id){
  const file = document.getElementById("img"+id).files[0];
  const img = document.getElementById("p"+id);

  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      img.src = e.target.result;
      img.style.display="block";
    };
    reader.readAsDataURL(file);
  }
}

/* 🔥 ENVIO SEM TRAVAR */
function responder(id){
  const select = document.getElementById("c"+id).value.split("|");
  const texto = document.getElementById("r"+id).value.trim();
  const file = document.getElementById("img"+id).files[0];

  if(!texto){
    alert("Digite a resposta");
    return;
  }

  const enviar = (img)=>{
    db.collection("perguntas").doc(id).update({
      respostas: firebase.firestore.FieldValue.arrayUnion({
        nome: select[0],
        foto: select[1],
        texto: texto,
        img: img || ""
      })
    }).then(()=>{
      document.getElementById("r"+id).value="";
      document.getElementById("p"+id).style.display="none";
    });
  };

  if(file){
    const reader = new FileReader();
    reader.onload = e=>enviar(e.target.result);
    reader.readAsDataURL(file);
  }else{
    enviar(null);
  }
}

/* EXCLUIR */
function apagar(id){
  if(confirm("Excluir pergunta?")){
    db.collection("perguntas").doc(id).delete();
  }
}
</script>

</body>
</html>
