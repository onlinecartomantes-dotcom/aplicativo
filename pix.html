<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pagamento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}

body{
margin:0;
font-family:'Poppins', Arial;
background:#f5f5f5;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:20px 16px 120px;
}

/* CARD */
.box{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* OPÇÕES */
.option{
border:1px solid #e6c068;
padding:18px;
margin-bottom:12px;
border-radius:14px;
cursor:pointer;
font-weight:600;
font-size:16px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.option:active{
transform:scale(0.98);
}

.option.selected{
background:#ffe58a;
border-color:#d4af37;
}

/* TEXTO */
.price{
margin-top:15px;
text-align:center;
font-weight:600;
font-size:15px;
}

/* PIX */
.pix-logo{
width:120px;
margin:25px auto;
display:block;
}

/* BOTÃO */
.btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:400px;
padding:16px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00c9a7,#00bfa5);
color:#fff;
font-size:17px;
font-weight:700;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.btn:disabled{
opacity:0.5;
}

/* SAFE AREA IOS */
@supports (padding: max(0px)) {
.btn{
bottom: max(20px, env(safe-area-inset-bottom));
}
}

</style>
</head>

<body>

<div class="container">

<div class="box">

<div id="opcoes"></div>

<div id="preco" class="price">
Selecione uma opção
</div>

<img class="pix-logo" src="https://artpoin.com/wp-content/uploads/2023/09/artpoin-logo-pix.png">

</div>

<button id="btn" class="btn" disabled>
Pagar com PIX
</button>

</div>

<script>

// DADOS
const nome = localStorage.getItem("consultorNome");
const valor = parseFloat(localStorage.getItem("consultorValor")) || 1.99;

// SEGURANÇA
if(!nome){
  window.location.href = "/aplicativo/index.html";
}

// MINUTOS
const minutos = [5,10,20,30];

let precoFinal = null;
let minutosSelecionados = null;

const opcoes = document.getElementById("opcoes");
const precoTxt = document.getElementById("preco");
const btn = document.getElementById("btn");

// GERAR OPÇÕES
minutos.forEach(m=>{

  const preco = (m * valor).toFixed(2);

  const div = document.createElement("div");
  div.className="option";

  div.innerHTML = `
    <div>${m} minutos</div>
    <div>R$ ${preco}</div>
  `;

  div.onclick = () => {

    document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    div.classList.add("selected");

    precoFinal = preco;
    minutosSelecionados = m;

    precoTxt.innerText = `Consulta com ${nome} • ${m} minutos = R$ ${preco}`;
    btn.disabled = false;
  };

  opcoes.appendChild(div);

});

// PAGAMENTO
btn.onclick = () => {

  const valorFormatado = precoFinal.replace('.', ',');
  const descricao = encodeURIComponent(`Consulta com ${nome} - ${minutosSelecionados} minutos`);

  window.location.href =
  `https://pagamentopix.helioho.st/index.php?valor=${valorFormatado}&descricao=${descricao}`;
};

</script>

</body>
</html>
