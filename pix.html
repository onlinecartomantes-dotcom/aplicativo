<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Pagamento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5f5f5;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px 16px;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* CARD */
.box{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* IMAGEM */
.topo-img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

/* TEXTO INFORMATIVO */
.texto-info{
  text-align:center;
  font-weight:600;
  color:#1b5e20; /* verde escuro */
  font-size:13px;
  margin-bottom:12px;
  line-height:1.3;
}

/* 🔥 URGÊNCIA SEM FUNDO */
.urgencia{
  text-align:center;
  font-weight:700;
  margin-bottom:14px;
  color:#1b5e20;
  font-size:13px;
}

.urgencia span{
  font-size:20px;
  display:block;
  margin-top:4px;
}

/* OPÇÕES */
.option{
  border:1px solid #e6c068;
  padding:18px;
  margin-bottom:12px;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  display:flex;
  justify-content:space-between;
}

.option.selected{
  background:#ffe58a;
  border-color:#d4af37;
}

/* BOTÃO */
.btn{
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#00c9a7,#00bfa5);
  color:#fff;
  font-size:17px;
  font-weight:700;
}

.btn:disabled{
  opacity:0.5;
}

/* AVISO */
.aviso{
  margin-top:12px;
  background:#ffe58a;
  border:1px solid #d4af37;
  padding:14px;
  border-radius:14px;
  font-size:13px;
  font-weight:600;
  text-align:center;
  color:#5a4a00;
}

/* INSTAGRAM FIX */
.app-view body{
  display:block;
}

</style>
</head>

<body>

<div class="container">

  <div class="box">

    <!-- IMAGEM -->
    <img class="topo-img" src="https://i.ibb.co/6h28fNp/Chat-GPT-Image-11-04-2026-19-41-52.png">

    <!-- TEXTO -->
    <div class="texto-info">
     
    </div>

    <!-- URGÊNCIA LIMPA -->
    <div class="urgencia">
      🔥 Seu consultor está disponível agora<br>
      pode sair em:
      <span id="contador">20</span>
    </div>

    <div id="opcoes"></div>

    <button id="btn" class="btn" disabled>
      Realizar Pagamento
    </button>

    <div class="aviso">
      ⚠️ Após o pagamento aguarde até 10 segundos. Não saia da página. Você será direcionado para o atendimento.
    </div>

  </div>

</div>

<script>

// DETECTA APP
const ua = navigator.userAgent.toLowerCase();
if (ua.includes("instagram") || ua.includes("fbav") || ua.includes("facebook")) {
  document.body.classList.add("app-view");
}

// CONTADOR 5 A 30
const contadorEl = document.getElementById("contador");

function iniciarContagem(){
  let tempo = Math.floor(Math.random() * 26) + 5;
  contadorEl.innerText = tempo;

  const intervalo = setInterval(()=>{
    tempo--;
    contadorEl.innerText = tempo;

    if(tempo <= 0){
      clearInterval(intervalo);
      iniciarContagem();
    }

  },1000);
}

iniciarContagem();

// DADOS
const nome = localStorage.getItem("consultorNome");
const valor = parseFloat(localStorage.getItem("consultorValor")) || 1.99;

if(!nome){
  window.location.href = "/aplicativo/index.html";
}

// MINUTOS
const minutos = [5,10,20,30];

let precoFinal = null;
let minutosSelecionados = null;

const opcoes = document.getElementById("opcoes");
const btn = document.getElementById("btn");

minutos.forEach(m=>{

  const preco = (m * valor).toFixed(2);

  const div = document.createElement("div");
  div.className="option";

  div.innerHTML = `
    <div>${m} minutos</div>
    <div>R$ ${preco}</div>
  `;

  div.onclick = () => {
    document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    div.classList.add("selected");

    precoFinal = preco;
    minutosSelecionados = m;

    btn.disabled = false;
  };

  opcoes.appendChild(div);

});

// PAGAMENTO
btn.onclick = () => {

  btn.innerText = "Processando...";
  btn.disabled = true;

  setTimeout(()=>{

    const valorFormatado = precoFinal.replace('.', ',');
    const descricao = encodeURIComponent(`Consulta com ${nome} - ${minutosSelecionados} minutos`);

    window.location.href =
    `https://pagamentopix.helioho.st/index.php?valor=${valorFormatado}&descricao=${descricao}`;

  }, 800);

};

</script>

</body>
</html>
