<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perguntas Express</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#fffdf5,#ffe8a3);
  margin:0;
}

/* TOPO */
.topo{
  text-align:center;
  font-size:20px;
  font-weight:700;
  padding:15px;
  color:#b8860b;
}

/* CHAT */
.chat{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* BLOCO */
.pergunta{
  margin:16px 0;
}

/* MSG */
.msg{
  display:flex;
  gap:8px;
  margin:8px 0;
  align-items:flex-start;
}

/* FOTO AJUSTADA (PERFEITA) */
.foto{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  flex-shrink:0;
}

/* BALÃO MELHORADO */
.balao{
  background:#fff;
  padding:10px 12px;
  border-radius:14px;
  max-width:80%;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  font-size:14px;
  line-height:1.4;
}

/* CONSULTOR */
.consultor{
  flex-direction:row-reverse;
}

/* IMAGEM MENOR E BONITA */
.resposta-img{
  width:100%;
  max-width:230px;
  height:auto;
  margin-top:8px;
  border-radius:12px;
  cursor:pointer;
  display:block;
}

/* BOTÃO */
.btn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:65px;
  height:65px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.btn img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* VIEWER */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.viewer img{
  max-width:92%;
  max-height:85%;
  border-radius:12px;
}

/* BOTÃO X */
.fechar{
  position:absolute;
  top:20px;
  right:20px;
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#ffd700;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">Perguntas Express ✨</div>

<div class="chat" id="chat"></div>

<!-- BOTÃO -->
<div class="btn" onclick="irPergunta()">
  <img src="https://i.ibb.co/cS6qbPpp/Whats-App-Image-2026-04-10-at-20-40-23-removebg-preview.png">
</div>

<!-- VIEWER -->
<div id="viewer" class="viewer">
  <button class="fechar" onclick="fechar()">×</button>
  <img id="imgView">
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");

db.collection("perguntas").orderBy("data","desc")
.onSnapshot(snap=>{
  chat.innerHTML="";

  snap.forEach(doc=>{
    let d = doc.data();

    let html = `
    <div class="pergunta">

      <div class="msg">
        <img class="foto" src="https://cdn-icons-png.flaticon.com/512/3870/3870822.png">
        <div class="balao">
          <b>${d.nome}</b><br>${d.pergunta}
        </div>
      </div>
    `;

    if(d.respostas){
      d.respostas.forEach(r=>{
        html += `
        <div class="msg consultor">
          <img class="foto" src="${r.foto}">
          <div class="balao">
            <b>${r.nome}</b><br>${r.texto}

            ${r.img ? `
              <img 
                class="resposta-img" 
                src="${r.img}" 
                onclick="abrir('${r.img}')"
              >
            ` : ""}
          </div>
        </div>
        `;
      });
    }

    html += `</div>`;
    chat.innerHTML += html;
  });
});

/* REDIRECIONAR */
function irPergunta(){
  window.location.href="https://onlinecartomantes-dotcom.github.io/aplicativo/perguntas.html";
}

/* ABRIR */
function abrir(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("imgView").src = src;
}

/* FECHAR */
function fechar(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
