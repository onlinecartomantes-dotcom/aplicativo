<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perguntas Express</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#fffdf5,#ffe8a3);
  margin:0;
}

.topo{
  text-align:center;
  font-size:20px;
  font-weight:700;
  padding:15px;
  color:#b8860b;
}

.chat{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.pergunta{
  margin:16px 0;
}

.msg{
  display:flex;
  gap:8px;
  margin:8px 0;
  align-items:flex-start;
}

.foto{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.balao{
  background:#fff;
  padding:10px 12px;
  border-radius:14px;
  max-width:80%;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.consultor{
  flex-direction:row-reverse;
}

/* 🔥 IMAGEM MELHORADA */
.resposta-img{
  width:100%;
  max-width:220px;
  margin-top:8px;
  border-radius:12px;
  cursor:pointer;
  object-fit:cover;
  transition:0.2s;
}

.resposta-img:active{
  transform:scale(0.97);
}

.btn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:65px;
  height:65px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
}

.btn img{
  width:100%;
  height:100%;
}

.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
}

.viewer img{
  max-width:92%;
  max-height:85%;
  border-radius:12px;
}

.fechar{
  position:absolute;
  top:20px;
  right:20px;
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#ffd700;
}
</style>
</head>

<body>

<div class="topo">Perguntas Express ✨</div>

<div class="chat" id="chat"></div>

<div class="btn" onclick="irPergunta()">
  <img src="https://i.ibb.co/cS6qbPpp/Whats-App-Image-2026-04-10-at-20-40-23-removebg-preview.png">
</div>

<div id="viewer" class="viewer">
  <button class="fechar" onclick="fechar()">×</button>
  <img id="imgView">
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 GARANTE TEMPO REAL NO PWA */
firebase.firestore().enableNetwork();

const chat = document.getElementById("chat");

/* BACK FORÇADO */
(function(){
  const url1 = "https://onlinecartomantes-dotcom.github.io/aplicativo/index.html";
  const url2 = "https://onlinecartomantes-dotcom.github.io/aplicativo/";

  history.pushState("forward", null, location.href);

  window.addEventListener("popstate", function(){
    try{
      window.location.replace(url1);
    }catch(e){
      window.location.replace(url2);
    }
  });
})();

/* 🔥 FIRESTORE OTIMIZADO */
db.collection("perguntas")
.orderBy("data","desc")
.onSnapshot({ includeMetadataChanges:true }, snap=>{

  chat.innerHTML="";

  snap.forEach(doc=>{
    let d = doc.data();

    let html = `
    <div class="pergunta">

      <div class="msg">
        <img class="foto" src="https://cdn-icons-png.flaticon.com/512/3870/3870822.png">
        <div class="balao">
          <b>${d.nome}</b><br>${d.pergunta}
        </div>
      </div>
    `;

    if(d.respostas){
      d.respostas.forEach(r=>{
        html += `
        <div class="msg consultor">
          <img class="foto" src="${r.foto}">
          <div class="balao">
            <b>${r.nome}</b><br>${r.texto}

            ${r.img ? `
              <img 
                class="resposta-img" 
                src="${r.img}" 
                onclick="abrir('${r.img}')"
                onerror="this.style.display='none'"
              >
            ` : ""}
          </div>
        </div>
        `;
      });
    }

    html += `</div>`;
    chat.innerHTML += html;
  });

});

/* IR */
function irPergunta(){
  window.location.href="https://onlinecartomantes-dotcom.github.io/aplicativo/perguntas.html";
}

/* VIEWER */
function abrir(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("imgView").src = src;
}

function fechar(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
