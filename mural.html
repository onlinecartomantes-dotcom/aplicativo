<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perguntas Express</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#fffdf5,#ffe8a3);
  margin:0;
}

.topo{
  text-align:center;
  font-size:20px;
  font-weight:700;
  padding:15px;
  color:#b8860b;
}

.chat{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.pergunta{margin:16px 0;}

.msg{
  display:flex;
  gap:8px;
  margin:8px 0;
}

.foto{
  width:40px;
  height:40px;
  border-radius:50%;
}

.balao{
  background:#fff;
  padding:10px;
  border-radius:12px;
  max-width:80%;
}

.consultor{flex-direction:row-reverse;}

.resposta-img{
  width:100%;
  max-width:220px;
  margin-top:8px;
  border-radius:10px;
}

.btn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:65px;
  height:65px;
  border-radius:50%;
  overflow:hidden;
}

.btn img{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="topo">Perguntas Express ✨</div>
<div class="chat" id="chat"></div>

<div class="btn" onclick="irPergunta()">
  <img src="https://i.ibb.co/cS6qbPpp/Whats-App-Image-2026-04-10-at-20-40-23-removebg-preview.png">
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");

/* 🔥 LISTENER SEM BUG */
db.collection("perguntas")
.onSnapshot(snapshot => {

  chat.innerHTML = "";

  snapshot.forEach(doc => {

    const d = doc.data();

    let html = `
    <div class="pergunta">

      <div class="msg">
        <img class="foto" src="https://cdn-icons-png.flaticon.com/512/3870/3870822.png">
        <div class="balao">
          <b>${d.nome || ""}</b><br>
          ${d.pergunta || ""}
        </div>
      </div>
    `;

    if(d.respostas){
      d.respostas.forEach(r=>{
        html += `
        <div class="msg consultor">
          <img class="foto" src="${r.foto}">
          <div class="balao">
            <b>${r.nome}</b><br>
            ${r.texto}

            ${r.img ? `<img class="resposta-img" src="${r.img}">` : ""}
          </div>
        </div>
        `;
      });
    }

    html += `</div>`;
    chat.innerHTML += html;

  });

}, error => {

  console.error("🔥 ERRO FIRESTORE:", error);
  alert("Erro ao carregar dados. Veja console (F12)");

});

function irPergunta(){
  window.location.href="https://onlinecartomantes-dotcom.github.io/aplicativo/perguntas.html";
}
</script>

</body>
</html>
