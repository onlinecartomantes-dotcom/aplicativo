<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Enviar Pergunta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body{
  height:100%;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(180deg,#fffdf5,#ffe8a3);

  display:flex;
  align-items:center;
  justify-content:center;

  padding:
    env(safe-area-inset-top)
    15px
    env(safe-area-inset-bottom);
}

.container{
  width:100%;
  max-width:420px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.titulo{
  font-size:20px;
  font-weight:700;
  text-align:center;
  color:#b8860b;
  margin-bottom:18px;
}

.input{
  width:100%;
  padding:15px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:14px;
  outline:none;
  background:#fafafa;
}

.input:focus{
  border-color:#ffd700;
  background:#fff;
  box-shadow:0 0 0 3px rgba(255,215,0,0.25);
}

textarea{
  min-height:110px;
  resize:none;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:18px;
  background:linear-gradient(45deg,#ffd700,#ffcc00);
  border:none;
  border-radius:14px;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.97);
}

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.obs{
  font-size:12px;
  margin-top:14px;
  color:#666;
  text-align:center;
}

.sucesso{
  display:none;
  margin-top:15px;
  background:#e6ffed;
  color:#0f5132;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  animation:fade 0.4s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="titulo">Escreva sua pergunta ✨</div>

    <input id="nome" class="input" placeholder="Ex: M.S • 12/05/1998">

    <textarea id="pergunta" class="input" placeholder="Digite sua pergunta aqui..."></textarea>

    <button id="btnEnviar" class="btn" onclick="enviar()">Enviar Pergunta</button>

    <div id="msgSucesso" class="sucesso">
      ✨ Mensagem enviada com sucesso!
    </div>

    <div class="obs">
      ⚠️ As respostas dependem da disponibilidade dos consultores.<br>
      Volte ao mural para ver sua resposta.
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 FORÇA ONLINE (IMPORTANTE PWA) */
firebase.firestore().enableNetwork();

function enviar(){

  const btn = document.getElementById("btnEnviar");
  const nome = document.getElementById("nome").value.trim();
  const pergunta = document.getElementById("pergunta").value.trim();

  if(nome === "" || pergunta === ""){
    alert("Preencha todos os campos");
    return;
  }

  /* 🔥 EVITA DUPLO CLIQUE */
  btn.disabled = true;
  btn.innerText = "Enviando...";

  db.collection("perguntas").add({
    nome: nome,
    pergunta: pergunta,
    data: new Date(),
    respostas: []
  })
  .then(()=>{

    document.getElementById("msgSucesso").style.display="block";

    document.getElementById("nome").value="";
    document.getElementById("pergunta").value="";

    setTimeout(()=>{
      window.location.href="https://onlinecartomantes-dotcom.github.io/aplicativo/mural.html";
    },1500);

  })
  .catch((err)=>{
    console.error(err);
    alert("Erro ao enviar. Verifique sua internet.");
    btn.disabled = false;
    btn.innerText = "Enviar Pergunta";
  });
}
</script>

</body>
</html>
