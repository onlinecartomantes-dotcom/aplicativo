<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mural</title>

<style>
body{font-family:Poppins;background:#fff4cc;margin:0;}
.chat{max-width:500px;margin:auto;padding:10px;}

.pergunta{
margin:15px 0;
}

.msg{
display:flex;
gap:10px;
margin:8px 0;
}

.msg img{
width:45px;height:45px;border-radius:50%;
}

.balao{
background:#fff;
padding:10px;
border-radius:10px;
max-width:80%;
}

.consultor{
flex-direction:row-reverse;
}

.resposta-img{
width:100%;
margin-top:8px;
border-radius:10px;
}

.btn{
position:fixed;
bottom:80px;
right:20px;
background:#ffd700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>
<div class="btn" onclick="location.href='pergunta.html'">+</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chat-6cee5.firebaseapp.com",
  projectId: "chat-6cee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");

db.collection("perguntas").orderBy("data","desc")
.onSnapshot(snap=>{
  chat.innerHTML="";

  snap.forEach(doc=>{
    let d = doc.data();

    let html = `
    <div class="pergunta">

      <div class="msg">
        <img src="https://cdn-icons-png.flaticon.com/512/3870/3870822.png">
        <div class="balao">
          <b>${d.nome}</b><br>${d.pergunta}
        </div>
      </div>
    `;

    if(d.respostas){
      d.respostas.forEach(r=>{
        html += `
        <div class="msg consultor">
          <img src="${r.foto}">
          <div class="balao">
            <b>${r.nome}</b><br>${r.texto}
            ${r.img ? `<img class="resposta-img" src="${r.img}">` : ""}
          </div>
        </div>
        `;
      });
    }

    html += `</div>`;
    chat.innerHTML += html;
  });
});
</script>

</body>
</html>
