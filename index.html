<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Fonte Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- 🔥 PWA (INSTALAÇÃO COMO APP) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">

<style>

*{box-sizing:border-box;}

/* 🔥 VARIÁVEIS DE TEMA (ETAPA 1) */
:root{
  --bg: linear-gradient(180deg, #fffdf5 0%, #fff4cc 40%, #ffe8a3 100%);
  --card: #fff;
  --text: #333;
  --subtext: #c47a00;
  --box: #fff;
}

/* 🌙 MODO ESCURO */
.dark{
  --bg: linear-gradient(180deg, #0f172a 0%, #020617 100%);
  --card: #111827;
  --text: #f1f5f9;
  --subtext: #facc15;
  --box: #1e293b;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;

  /* 🔥 AGORA DINÂMICO */
  background: var(--bg);
  background-attachment: fixed;

  overflow-x:hidden;

  max-width:500px;
  margin:auto;

  /* 🔥 TRANSIÇÃO SUAVE */
  transition: all 0.3s ease;
}

/* TOPO */
.topo-novo{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
}

/* 🔥 TODAS AS IMAGENS IGUAIS (CORRIGIDO) */
.topo-novo img{
  width:60px;        /* 🔥 antes era 15vw */
  height:60px;
  max-width:80px;
  max-height:80px;

  object-fit:contain;

  border-radius:0;
  box-shadow:none;
  background:none;
}

/* só posiciona a da direita */
.logo-direita{
  margin-left:auto;
}

.ola{
  font-size:32px;
  font-weight:600;
  color: var(--text);
}

/* BOX */
.box{
  background: var(--box);
  margin:15px;
  padding:15px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* OPÇÕES */
.opcoes{
  display:flex;
  gap:10px;
  margin-top:5px;

  overflow-x:hidden;
  scroll-behavior:smooth;
  justify-content:space-between;

  scrollbar-width:none;
}

.opcoes::-webkit-scrollbar{
  display:none;
}
.op{
  flex:1;
  min-width:0;
  padding:12px 6px;
  border-radius:16px;
  border:2px solid #e6c068;
  text-align:center;
  color:#b8860b;
  font-weight:bold;
  cursor:pointer;
  background:#f7f1e3;
  white-space:nowrap;
}

.op img{
  width:34px;
  height:34px;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

/* 👇 INSTAGRAM / FACEBOOK */
.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}
.op.active{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#fff;
}
.op.active img{
  filter: brightness(0) invert(1);
}
/* TITULOS */
.titulo{
margin:12px 15px 6px;
font-weight:700;
font-size:18px;

/* 🔥 COR DINÂMICA */
color: var(--text);

display:flex;
align-items:center;
gap:12px;
}
.titulo img{
width:40px;
}

/* SCROLL */
.scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px 15px;
scroll-snap-type:x mandatory;
}

.scroll::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
flex:0 0 280px;
width:280px;
max-width:280px;
min-width:280px;
min-height:150px;
border-radius:20px;
padding:16px 10px;
position:relative;

/* 🔥 AGORA DINÂMICO */
background: var(--card);

box-shadow:0 6px 18px rgba(0,0,0,0.08);
scroll-snap-align:center;
overflow:hidden;
text-align:center;

/* 🔥 LINK CORRETO */
display:block;
text-decoration:none;
color:inherit;

/* 🔥 TRANSIÇÃO BONITA */
transition: all 0.3s ease;
}
/* 🔥 LINK DO CARD (CORRIGIDO) */
.card{
  display:block;
  text-decoration:none;
  color:inherit;

  position:relative;
}

/* 🔥 REMOVE AZUL E SUBLINHADO */
.card{
  text-decoration:none;
  color:inherit;
}

/* 🔥 EFEITO DE CLIQUE */
.card:active{
  transform:scale(0.98);
}
/* 🔥 FUNDO DO CARD */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('https://i.ibb.co/yBnPKpsp/Whats-App-Image-2026-04-07-at-22-40-41.jpg');
  background-size:cover;
  background-position:center;
  opacity:0.5;
  z-index:0; /* fica atrás */
}

/* 🔥 CONTEÚDO SEMPRE NA FRENTE */
.card *{
  position:relative;
  z-index:1;
}
/* ⏰ TEMPO (PEQUENO, LIMPO E RESPONSIVO) */
.tempo{
  position:absolute;
  top:8px;
  left:2px;   /* 🔥 mais pra esquerda */

  display:inline-flex;
  align-items:center;
  gap:4px;

  /* 🔥 AGORA DINÂMICO */
  background: var(--box);
  color: var(--subtext);

  font-size:10px;
  font-weight:bold;
  padding:4px 8px;
  border-radius:15px;

  z-index:999;
  max-width:70%;
}

/* 🔥 ÍCONE MENOR */
.tempo svg{
  width:12px;
  height:12px;

  /* 🔥 COR DINÂMICA */
  stroke: var(--subtext);
}
/* FOTO (CORRIGIDO PRO INSTAGRAM) */
.foto{
  width:100%;
  max-width:140px;
  aspect-ratio:1/1;

  margin:auto;
  margin-top:5px;
  border-radius:50%;
  padding:4px;

  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}

.foto img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* 🟢 ONLINE PISCANDO */
.online{
  position:absolute;
  top:4px;
  right:4px;
  width:15px;
  height:15px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.4);opacity:0.5;}
  100%{transform:scale(1);opacity:1;}
}

/* TEXTO CENTRAL */
.nome,.desc,.foot{
  text-align:center;
}

/* NOME */
.nome{
  margin-top:15px;
  font-weight:600;
  font-size:clamp(18px, 4vw, 24px);
  color: var(--text);
}

/* DESCRIÇÃO */
.desc{
  margin-top:8px;

  height:52px;                 /* trava altura igual */
  display:flex;
  align-items:center;          /* centraliza vertical */
  justify-content:center;      /* centraliza horizontal */

  text-align:center;
  line-height:1.2;

  font-size:clamp(13px,3vw,18px);
  font-weight:600;

  padding:0 6px;
}
/* 🔥 CORREÇÃO DO TEXTO QUE ESTOURA */
.foot{
  font-size:13px;
  margin-top:15px;
  background:rgba(255, 215, 0, 0.5);
  border-radius:20px;
  padding:8px;
  font-weight:500;

  white-space:normal;
  word-break:break-word;
  overflow-wrap:break-word;
  line-height:1.3;
}

/* 👇 GLOBAL SAFE */
img{
  max-width:100%;
  height:auto;
}

*{
  word-wrap:break-word;
  overflow-wrap:break-word;
}

/* 🔥 AJUSTE INSTAGRAM */
.app-view .foto{
  max-width:120px;
}

.app-view .nome{
  font-size:18px;
}

.app-view .desc{
  font-size:14px;
}

.app-view .foot{
  font-size:12px;
  padding:6px;
}

/* 🔥 CARD DESTAQUE */
.card-destaque{
  background: var(--card);
  margin:15px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
  transition: all 0.3s ease;
}

.card-destaque::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('...');
  background-size:cover;
  background-position:center;
  opacity:0.5;
}

.card-destaque *{
  position:relative;
  z-index:2;
}

.topo-destaque{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.card-destaque .topo-destaque > div{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* FOTO DESTAQUE */
.foto-destaque{
  width:100px;
  height:100px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}

.foto-destaque img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.foto-destaque .online{
  position:absolute;
  top:4px;
  right:4px;
  width:14px;
  height:14px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);
  animation:pulse 1.2s infinite;
}

/* BADGE */
.badge{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#000;
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  display:inline-block;
}

/* NOME DESTAQUE */
.card-destaque .nome-destaque{
  display:block;
  margin-top:5px;
  font-weight:600;
  font-size:clamp(18px, 4vw, 24px);
  color: var(--text);
}

/* SUB */
.sub{
  font-size:clamp(14px, 3.5vw, 18px);
  color: var(--subtext);
  margin-top:12px;
}

/* INFO */
.info{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* PESSOAS */
#pessoasSemana{
  background:rgba(255, 215, 0, 0.5);
  padding:8px;
  border-radius:20px;
  font-size:13px;
}

/* TEMPO */
#tempoSemana{
  display:flex;
  align-items:center;
  gap:6px;
  background: var(--box);
  color: var(--subtext);
  font-size:11px;
  font-weight:bold;
  padding:5px 10px;
  border-radius:20px;
}

#tempoSemana svg{
  width:14px;
  height:14px;
  stroke: var(--subtext);
}

/* TEXTO */
.texto{
  margin-top:15px;
  font-size:14px;
  color: var(--text);
}

/* BOTÃO */
.btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00bfa6,#1abc9c);
  color:#fff;
  font-size:18px;
  font-weight:600;
}

/* CARD OFERTA */
.card-oferta{
  flex:0 0 auto;
  width:85%;
  max-width:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.img-box{
  position:relative;
}

.img-box img{
  width:100%;
  display:block;
  border-radius:20px;
}

.btn-oferta{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  padding:14px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#00bfa6,#1abc9c);
  color:#fff;
  font-size:16px;
  font-weight:600;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

/* DARK MODE */
.dark div[style*="background:#fff"]{
  background:#020617 !important;
  color:#fff !important;
}

.dark .ola,
.dark .titulo,
.dark .nome{
  color:#ffffff !important;
}

.dark .desc{
  color:#facc15 !important;
}

.dark .texto{
  color:#cbd5e1 !important;
}

.dark .box{
  background:#020617 !important;
}

.dark .card{
  background:#020617 !important;
}

.dark .op{
  background:#0f172a !important;
  color:#facc15 !important;
  border:2px solid rgba(250,204,21,0.3) !important;
}

.dark #toggleTema{
  background:#facc15 !important;
  color:#000 !important;
}
.dark #toggleTema{
 background:#facc15 !important;
 color:#000 !important;
}

/* ===== LOJA PRODUTOS ===== */

.scroll{
display:flex;
gap:14px;
overflow-x:auto;
padding:10px 15px;
scroll-behavior:smooth;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}

.scroll::-webkit-scrollbar{
display:none;
}

.produto-card{
flex:0 0 auto;
width:86%;
max-width:320px;
min-width:260px;
background:var(--card);
border-radius:24px;
padding:14px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
scroll-snap-align:center;
transition:.25s;
}

.produto-card:active{
transform:scale(.98);
}

.produto-img{
background:#fff6c9;
height:190px;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
padding:14px;
margin-bottom:14px;
overflow:hidden;
}

.produto-img img{
max-width:100%;
max-height:170px;
object-fit:contain;
display:block;
}

.produto-nome{
font-size:15px;
font-weight:700;
color:var(--text);
line-height:1.35;
min-height:72px;
max-height:72px;
overflow:hidden;
margin-bottom:14px;
}

.produto-btn{
display:block;
width:100%;
text-align:center;
padding:14px;
border-radius:18px;
background:linear-gradient(45deg,#00bfa6,#1abc9c);
color:#fff;
font-weight:700;
text-decoration:none;
font-size:15px;
box-shadow:0 6px 18px rgba(0,191,166,.25);
}

.produto-btn:active{
transform:scale(.98);
}

/* MODO ESCURO */
.dark .produto-card{
background:#020617 !important;
}

.dark .produto-img{
background:#1e293b !important;
}

.dark .produto-nome{
color:#fff !important;
}

.dark .produto-btn{
background:linear-gradient(45deg,#facc15,#eab308);
color:#000 !important;
}

/* CELULAR */
@media(max-width:600px){

.produto-card{
width:88%;
min-width:250px;
max-width:280px;
padding:12px;
}

.produto-img{
height:170px;
}

.produto-img img{
max-height:150px;
}

.produto-nome{
font-size:14px;
min-height:66px;
max-height:66px;
}

.produto-btn{
font-size:14px;
padding:13px;
}

}

</style>

  // 🔥 define o horário de saída (fim do expediente)
  offlineDesde.setHours(a?.fim || 23, 0, 0, 0);

  // 🔥 se ainda não chegou no fim hoje → usa o de ontem
  if(agora < offlineDesde){
    offlineDesde.setDate(offlineDesde.getDate() - 1);
  }

  const minutosOffline = Math.floor((agoraMs - offlineDesde.getTime()) / 60000);

  return {
    online: false,
    tempo: minutosOffline
  };
}
// ⏸ PAUSA (CORRIGIDO E COM TEMPO REAL)
if(a && a.pausa && hora >= a.pausa[0] && hora < a.pausa[1]){

  // 🔥 força offline durante pausa
  if(estado.online){
    estado.online = false;
    estado.mudouEm = agoraMs;
  }

  // 🔥 salva estado
  localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

  // 🔥 calcula tempo desde início da pausa
  let pausaInicio = new Date();
  pausaInicio.setHours(a.pausa[0], 0, 0, 0);

  const minutosOffline = Math.floor((agoraMs - pausaInicio.getTime()) / 60000);

  return {
    online:false,
    tempo:minutosOffline
  };
}
// 🔥 TROCA INTELIGENTE (COM TEMPO MÍNIMO)
const tempoMinimo = 3 + Math.floor(Math.random()*3); 
// entre 3 e 5 minutos

if(agoraMs - estado.mudouEm > tempoMinimo * 60000){

  if(Math.random() < 0.3){
    estado.online = !estado.online;
    estado.mudouEm = agoraMs;
  }

}
// 🔥 salva sempre
localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

const minutosPassados = Math.floor((agoraMs - estado.mudouEm)/60000);

// 🔥 RESET DO CONTADOR OFFLINE (AQUI 👇)
if(estado.online){
  estado.offlineDesde = null;
}
// 🟢 ONLINE → FILA REAL
if(estado.online){

  // 🔥 quantidade de pessoas na fila (1 a 4)
  const fila = Math.floor(Math.random()*4)+1;

  // 🔥 tempo base por pessoa (5 a 10 minutos)
  const tempoBase = 5 + Math.floor(Math.random()*6);

  // 🔥 tempo total de espera
  const tempoFila = fila * tempoBase;

  return { 
    online:true, 
    tempo:tempoFila,
    fila:fila
  };
}

// 🔴 OFFLINE → TEMPO REAL
return { online:false, tempo:minutosPassados };
}

  if(!statusCache[nome]){

// ⏱ FORMATAR TEMPO
function formatarTempo(min){

  if(min >= 60){
    const h = Math.floor(min/60);
    const m = min % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  return min + " min";
}

<script>

// 🔥 LISTA TOTAL
function todosConsultores(){
  return [
    ...banco.clareza,
    ...banco.motivacao,
    ...banco.esperanca
  ];
}

// 🔥 PEGA CONSULTORES NO HORÁRIO (SEM BUG)
function consultoresOcupados(){

  const hora = new Date().getHours();

  return todosConsultores().filter(c => {

    const a = agenda[c.nome];
    if(!a) return false;

    // ✅ dentro do horário
    const dentroHorario = hora >= a.inicio && hora < a.fim;

    if(!dentroHorario) return false;

    // ✅ pega status REAL (igual ao card)
    const status = getStatus(c.nome);

    // ✅ regra principal
    return status && status.online === false;

  });

}
// 🔥 MOSTRAR POPUP (BLINDADO)
function mostrarPopup(){

  const hora = new Date().getHours();

  const ocupados = consultoresOcupados();

  // 🔥 BLOQUEIO INTELIGENTE (madrugada)
  if(hora >= 2 && hora < 10 && ocupados.length === 0){
    agendarPopup();
    return;
  }

  // 🔥 se não tiver ninguém no horário → tenta de novo
  if(ocupados.length === 0){
    agendarPopup();
    return;
  }

  let random = ocupados[Math.floor(Math.random() * ocupados.length)];

  const popup = document.getElementById("popupOcupado");

  if(!popup){
    agendarPopup();
    return;
  }

  // 🔥 mensagem (SEM depender de online/offline)
  popup.innerText = `💬 ${random.nome} está em atendimento`;

  // 🔥 reset
  popup.style.display = "block";
  popup.style.opacity = "0";
  popup.style.transform = "translateX(-50%) translateY(20px)";
  popup.style.transition = "none";

  // 🔥 entrada
  setTimeout(()=>{
    popup.style.transition = "0.3s";
    popup.style.opacity = "1";
    popup.style.transform = "translateX(-50%) translateY(0)";
  },50);

  // 🔥 saída
  setTimeout(()=>{
    popup.style.opacity = "0";
    popup.style.transform = "translateX(-50%) translateY(20px)";

    setTimeout(()=>{
      popup.style.display = "none";
      agendarPopup();
    },300);

  },3000);
}

// 🔥 LOOP ESTÁVEL (NÃO TRAVA)
function agendarPopup(){
  const tempo = Math.random() * 4000 + 3000; // 3s a 7s
  setTimeout(() => {
    mostrarPopup();
  }, tempo);
}

// 🔥 START GARANTIDO (ESPERA O PWA PRIMEIRO)
setTimeout(() => {

  const pwa = document.getElementById("pwaPopup");

  // 🔥 se o popup de instalação estiver aberto, espera fechar
  if(pwa && pwa.style.display === "flex"){

    const check = setInterval(() => {
      if(pwa.style.display === "none"){
        clearInterval(check);
        mostrarPopup();
      }
    }, 500);

  } else {
    mostrarPopup();
  }

}, 6000);

</script>

<script>

// 🔥 detecta tema automático
function detectarTemaSistema(){
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

// 🔥 aplica tema
function aplicarTema(){

  let tema = localStorage.getItem("tema");

  if(!tema){
    tema = detectarTemaSistema() ? "dark" : "light";
  }

  const btn = document.getElementById("toggleTema");

  if(tema === "dark"){
    document.body.classList.add("dark");
    if(btn) btn.innerText = "☀️";
  }else{
    document.body.classList.remove("dark");
    if(btn) btn.innerText = "🌙";
  }

}

// 🔥 alterna tema
function alternarTema(){

  const escuro = document.body.classList.contains("dark");

  if(escuro){
    localStorage.setItem("tema","light");
  }else{
    localStorage.setItem("tema","dark");
  }

  aplicarTema();
}

// 🔥 inicia
document.addEventListener("DOMContentLoaded", () => {

  const btn = document.getElementById("toggleTema");

  if(btn){
    btn.onclick = alternarTema;
  }

  aplicarTema();

});

// 🔥 se sistema mudar
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {

  if(!localStorage.getItem("tema")){
    aplicarTema();
  }

});
