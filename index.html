<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:none;
  overflow-x:hidden;

  max-width:500px;  /* 👈 ADICIONA */
  margin:auto;      /* 👈 ADICIONA */
}
/* TOPO */
.topo-novo{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
}

/* 🔥 TODAS AS IMAGENS IGUAIS */
.topo-novo img{
  width:15vw;
  height:15vw;
  max-width:80px;
  max-height:80px;

  border-radius:0;
  box-shadow:none;
  background:none;
}

/* só posiciona a da direita */
.logo-direita{
  margin-left:auto;
}
.ola{
  font-size:32px;
  font-weight:600;
  color:#000;
}
/* BOX */
.box{
background:#fff;
margin:15px;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* OPÇÕES */
.opcoes{
  display:flex;
  gap:10px;
  margin-top:5px;

  overflow-x:hidden; /* ✅ padrão SEM scroll */
  scroll-behavior:smooth;
  justify-content:space-between;

  /* 👇 esconder barra de rolagem */
  scrollbar-width:none; /* Firefox */
}

.opcoes::-webkit-scrollbar{
  display:none; /* Chrome, Safari, Instagram */
}

.op{
  flex:1;              /* ✅ divide espaço no Chrome/Safari */
  min-width:0;         /* ✅ evita quebrar no Safari */
  padding:12px 6px;
  border-radius:16px;
  border:2px solid #e6c068;
  text-align:center;
  color:#b8860b;
  font-weight:bold;
  cursor:pointer;
  background:#f7f1e3;
  white-space:nowrap; /* evita quebrar texto */
}

.op img{
  width:34px;
  height:34px;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

/* 👇 SOMENTE INSTAGRAM / FACEBOOK (volta o scroll) */
.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}

.op.active{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#fff;
}
.op.active img{
  filter: brightness(0) invert(1);
}
/* TITULOS */
.titulo{
margin:12px 15px 6px;
font-weight:700;
font-size:18px;
color:#333;
display:flex;
align-items:center;
gap:12px;
}

.titulo img{
width:40px;
}

/* SCROLL */
.scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px 15px;
scroll-snap-type:x mandatory;
}

.scroll::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
flex:0 0 auto;
width:80%;
max-width:300px;
min-height:150px;
border-radius:20px;
padding:16px 10px;
position:relative;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
scroll-snap-align:center;
overflow:hidden;
text-align:center;

/* 🔥 CORREÇÃO DO LINK */
display:block;
text-decoration:none;
color:inherit;
}

/* 🔥 REMOVE AZUL E SUBLINHADO DE TUDO */
.card{
text-decoration:none;
color:inherit;
}
/* 🔥 EFEITO DE CLIQUE (OPCIONAL TOP) */
.card:active{
transform:scale(0.98);
}

/* FUNDO */
.card::before{
content:"";
position:absolute;
inset:0;
background-image:url('https://i.ibb.co/yBnPKpsp/Whats-App-Image-2026-04-07-at-22-40-41.jpg');
background-size:cover;
background-position:center;
opacity:0.5;
}

/* GARANTE QUE TEXTO FIQUE NA FRENTE */
.card *{
position:relative;
z-index:1;
}
/* ⏰ TEMPO COM RELÓGIO */
.tempo{
position:absolute;
top:10px;
left:10px;
display:flex;
align-items:center;
gap:6px;
background:#fff3cd;
color:#b8860b;
font-size:11px;
font-weight:bold;
padding:5px 10px;
border-radius:20px;
}

.tempo svg{
width:14px;
height:14px;
}

/* FOTO */
.foto{
  width:30vw;
  height:30vw;
  max-width:140px;
  max-height:140px;
  margin:auto;
  margin-top:5px; /* sobe um pouco */
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}
.foto img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}
/* 🟢 ONLINE PISCANDO */
.online{
  position:absolute;
  top:4px;
  right:4px;
  width:15px;
  height:15px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.4);opacity:0.5;}
100%{transform:scale(1);opacity:1;}
}

/* TEXTO CENTRAL */
.nome,.desc,.foot{
text-align:center;
}

.nome{
  margin-top:15px; /* mais próximo da foto */
  font-weight:600;
   font-size:clamp(18px, 5vw, 26px);
  color:#333;
}

.desc{
  font-size:clamp(14px, 4vw, 18px);
  color:#c47a00; /* voltou para o dourado/amarelo */
  margin-top:8px;
}

.foot{
  font-size:13px;
  margin-top:15px;
  background:rgba(255, 215, 0, 0.5); /* amarelo com transparência */
  border-radius:20px;
  padding:8px;
  font-weight:500;
}

/* 👇 PARTE 7 (IMPORTANTE) */
img{
  max-width:100%;
  height:auto;
}

*{
  word-wrap:break-word;
}

.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}

/* 🔥 CARD DESTAQUE (PADRÃO DOS CARDS) */
.card-destaque{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
}

.card-destaque::before{

  inset:0;
  background-image:url('https://i.ibb.co/yBnPKpsp/Whats-App-Image-2026-04-07-at-22-40-41.jpg');

  background-position:center;
  opacity:0.5;
}

.card-destaque *{
  position:relative;
  z-index:1;
}

/* 🔥 TOPO CORRIGIDO (ESSA É A CHAVE) */
.topo-destaque{
  display:flex;
  gap:12px;
  align-items:flex-start; /* 👈 CORREÇÃO AQUI */
}

/* 🔥 LIBERA O BLOCO DE TEXTO */
.card-destaque .topo-destaque > div{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* 🔥 FOTO IGUAL AOS CARDS */
.foto-destaque{
  width:100px;
  height:100px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}

.foto-destaque img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* 🔥 ONLINE */
.foto-destaque .online{

  height:14px;

}

/* 🔥 BADGE */
.badge{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#000;
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  display:inline-block;
}

/* 🔥 NOME (AGORA DESCE DE VERDADE) */
.card-destaque .nome-destaque{

/* 🔥 SUB */

/* 🔥 INFO */

/* 🔥 PESSOAS */

/* 🔥 TEMPO */

/* 🔥 BOTÃO */
.btn{

/* 🔥 CARD OFERTA (NOVO MODELO) */

</style>

function estaOnline(nome) {
  const agora = new Date();

  if (hora >= 2 && hora < 10) {
    return false;
  }

  const agoraMs = Date.now();

  // ⏱️ Atualiza somente a cada 1 minuto
  if (agoraMs - ultimoUpdate > 10000) {

      ...banco.motivacao,
      ...banco.esperanca
    ];

    });

    localStorage.setItem("statusOnline", JSON.stringify(statusOnline));
    localStorage.setItem("ultimoUpdate", agoraMs);
  }

  return statusOnline[nome];
}

function renderDestaque(){

const todos=[...banco.clareza,...banco.motivacao,...banco.esperanca];
const semana=Math.floor(Date.now()/604800000);
const c=todos[semana % todos.length];
const online = estaOnline(c.nome);

// 🔥 FOTO + NOME
document.getElementById("fotoSemana").src=c.img;
document.getElementById("nomeSemana").innerText=c.nome;

// 🔥 INFO
document.getElementById("pessoasSemana").innerText=
(Math.floor(Math.random()*300)+200)+" pessoas ajudadas";

document.getElementById("tempoTexto").innerText=
"≈"+(Math.floor(Math.random()*3)+1)+"h";

document.getElementById("descSemana").innerText=
descricoes[c.nome] || "Estou aqui para te ajudar com clareza.";


// 🔥 BOTÃO (controle correto)
const btn = document.getElementById("btnSemana");

// 🔥 só executa se o botão existir (não quebra a função)
if(btn){

  // 🔥 SEMPRE atualiza estado corretamente
  if(online){

    btn.style.display = "block";
    btn.innerText = "Consultar " + c.nome;

    btn.onclick = () => {
      localStorage.setItem("consultorNome", c.nome);
      localStorage.setItem("consultorImagem", c.img);
      window.location.href="/aplicativo/perfil.html";
    };

  }else{
    btn.style.display = "none";
  }

} // ✅ fecha corretamente (SEM else extra)

} // ✅ FECHA A FUNÇÃO renderDestaque AQUI


// 🔥 CONTROLE DO TIPO ATUAL (FORA DA FUNÇÃO)
let tipoAtual = "clareza";


// 🔥 MENU
function trocar(tipo,el){

  tipoAtual = tipo;

  document.querySelectorAll(".op").forEach(o=>o.classList.remove("active"));

  el.classList.add("active");

  renderPrincipal(tipo);

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}
// 🔥 INICIALIZA
renderPrincipal(tipoAtual);


// 🔥 ATUALIZA AUTOMÁTICO
setInterval(() => {
  renderDestaque();
}, 10000);

/* =========================
   🔥 PWA + DETECÇÃO
========================= */

const ua = navigator.userAgent.toLowerCase();

if (ua.includes("instagram") || ua.includes("fbav") || ua.includes("facebook")) {
  document.body.classList.add("app-view");
}

let deferredPrompt;

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isInApp(){
  return ua.includes("instagram") || ua.includes("fb") || ua.includes("messenger");
}

function isAndroid(){
  return /android/i.test(navigator.userAgent);
}

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;
});

function abrirPWA(){

  if(window.matchMedia('(display-mode: standalone)').matches) return;

  const popup = document.getElementById("pwaPopup");
  const titulo = document.getElementById("pwaTitulo");
  const texto = document.getElementById("pwaTexto");
  const steps = document.getElementById("pwaSteps");
  const btn = document.getElementById("pwaBtn");

  popup.style.display="flex";

  if(isInApp()){
    titulo.innerText="ABRIR NO NAVEGADOR";
    texto.innerHTML="Você está dentro do Instagram/Facebook.";
    steps.innerHTML=`
    1. Toque em <b>⋮</b><br>
    2. Abrir no navegador<br>
    3. Depois instale o aplicativo
    `;

    btn.innerText="COPIAR LINK";
    btn.onclick=()=>{
      navigator.clipboard.writeText(location.href);
      alert("Link copiado!");
    };
    return;
  }

  if(isIOS()){
    titulo.innerText="INSTALAR NO IPHONE";
    texto.innerHTML="Siga os passos abaixo:";
    steps.innerHTML=`
    1. Toque em <b>Compartilhar ⤴️</b><br>
    2. Role a tela<br>
    3. Toque em <b>Adicionar à Tela de Início</b><br>
    4. Confirmar
    `;

    btn.innerText="ENTENDI";
    btn.onclick=fecharPWA;
    return;
  }

  if(deferredPrompt){
    titulo.innerText="INSTALAR APLICATIVO";
    texto.innerHTML="Instale agora:";
    steps.innerHTML=`
    ✔ Acesso rápido<br>
    ✔ Funciona como app<br>
    ✔ Mais leve e rápido
    `;

    btn.innerText="INSTALAR AGORA";
    btn.onclick=()=>{
      deferredPrompt.prompt();
      popup.style.display="none";
    };
    return;
  }

  titulo.innerText="INSTALAR NO DISPOSITIVO";
  texto.innerHTML="Você pode instalar este site como aplicativo.";
  steps.innerHTML=`
  👉 No Chrome / Edge:<br>
  1. Clique em <b>⋮</b><br>
  2. "Instalar aplicativo"<br><br>

  👉 Outros navegadores:<br>
  1. Use o menu<br>
  2. Adicionar à tela inicial
  `;

  btn.innerText="ENTENDI";
  btn.onclick=fecharPWA;
}

function fecharPWA(){
  document.getElementById("pwaPopup").style.display="none";
}

setTimeout(abrirPWA,2000);

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

</script>

<!-- 🔥 POPUP -->
<div id="pwaPopup" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:99999;
align-items:center;
justify-content:center;
padding:15px;
">

  <div style="
  background:#000;
  color:#fff;
  padding:20px;
  border-radius:15px;
  max-width:340px;
  width:100%;
  text-align:center;
  box-shadow:0 0 25px rgba(255,215,0,0.4);
  ">

    <h2 id="pwaTitulo" style="color:#ffd700;"></h2>
    <div id="pwaTexto"></div>
    <div id="pwaSteps" style="margin-top:10px;text-align:left;"></div>

    <button id="pwaBtn" style="
    margin-top:12px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#ffd700;
    font-weight:bold;
    ">
      CONTINUAR
    </button>

    <button onclick="fecharPWA()" style="
    margin-top:8px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#333;
    color:#fff;
    ">
      AGORA NÃO
    </button>

  </div>

</div>
