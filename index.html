*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins', sans-serif;

  /* рџ”Ґ FUNDO MAIS BONITO E SUAVE */
  background: linear-gradient(180deg, #fffdf5 0%, #fff4cc 40%, #ffe8a3 100%);
  background-attachment: fixed;

  overflow-x:hidden;

  max-width:500px;  /* рџ‘€ mantГ©m */
  margin:auto;      /* рџ‘€ mantГ©m */
}

/* TOPO */
.topo-novo{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
}

/* рџ”Ґ TODAS AS IMAGENS IGUAIS */
.topo-novo img{

.logo-direita{

}
.ola{

}
/* BOX */
.box{
background:#fff;
margin:15px;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* OPГ‡Г•ES */
.opcoes{
  display:flex;
  gap:10px;
  margin-top:5px;

  overflow-x:hidden; /* вњ… padrГЈo SEM scroll */
  scroll-behavior:smooth;
  justify-content:space-between;

  /* рџ‘‡ esconder barra de rolagem */
  scrollbar-width:none; /* Firefox */
}

.opcoes::-webkit-scrollbar{
  display:none; /* Chrome, Safari, Instagram */
}

.op{
  flex:1;              /* вњ… divide espaГ§o no Chrome/Safari */
  min-width:0;         /* вњ… evita quebrar no Safari */
  padding:12px 6px;
  border-radius:16px;
  border:2px solid #e6c068;
  text-align:center;
  color:#b8860b;
  font-weight:bold;
  cursor:pointer;
  background:#f7f1e3;
  white-space:nowrap; /* evita quebrar texto */
}

.op img{
  width:34px;
  height:34px;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

/* рџ‘‡ SOMENTE INSTAGRAM / FACEBOOK (volta o scroll) */
.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}

.op.active{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#fff;
}
.op.active img{
  filter: brightness(0) invert(1);
}
/* TITULOS */
.titulo{
margin:12px 15px 6px;
font-weight:700;
font-size:18px;
color:#333;
display:flex;
align-items:center;
gap:12px;
}

.titulo img{
width:40px;
}

/* SCROLL */
.scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px 15px;
scroll-snap-type:x mandatory;
}

.scroll::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
flex:0 0 auto;
width:80%;
max-width:300px;
min-height:150px;
border-radius:20px;
padding:16px 10px;
position:relative;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
scroll-snap-align:center;
overflow:hidden;
text-align:center;

/* рџ”Ґ CORREГ‡ГѓO DO LINK */
display:block;
text-decoration:none;
color:inherit;
}

/* рџ”Ґ REMOVE AZUL E SUBLINHADO DE TUDO */
.card{
text-decoration:none;
color:inherit;
}
/* рџ”Ґ EFEITO DE CLIQUE (OPCIONAL TOP) */
.card:active{
transform:scale(0.98);
}

/* рџ”Ґ BASE DO CARD (IMPORTANTE) */
.card{
  position:relative;
}

/* рџ”Ґ FUNDO DO CARD */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('https://i.ibb.co/yBnPKpsp/Whats-App-Image-2026-04-07-at-22-40-41.jpg');
  background-size:cover;
  background-position:center;
  opacity:0.5;
  z-index:0; /* fica atrГЎs */
}

/* рџ”Ґ CONTEГљDO SEMPRE NA FRENTE */
.card *{
  position:relative;
  z-index:1;
}
/* вЏ° TEMPO (PEQUENO, LIMPO E RESPONSIVO) */
.tempo{
  position:absolute;
  top:8px;
  left:2px;   /* рџ”Ґ mais pra esquerda */

  align-items:center;
  gap:4px;

  background:#fff3cd;
  color:#b8860b;
  font-size:10px;
  font-weight:bold;

  max-width:70%;
}
/* рџ”Ґ Г­cone menor */
.tempo svg{
  width:12px;
  height:12px;
}

/* FOTO */
.foto{
  width:30vw;
  height:30vw;
  max-width:140px;
  max-height:140px;
  margin:auto;
  margin-top:5px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);

}

.foto img{
  width:100%;
  height:100%;
  border-radius:50%;

}
/* рџџў ONLINE PISCANDO */
.online{

  top:4px;
  right:4px;
  width:15px;
  height:15px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);

}
@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.4);opacity:0.5;}
100%{transform:scale(1);opacity:1;}
}

/* TEXTO CENTRAL */
.nome,.desc,.foot{
text-align:center;
}

.nome{

   font-size:clamp(18px, 5vw, 26px);

img{

</style>

<script>

{nome:"Sulamita",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/05/27/47a447851c-1-.jpg"},
{nome:"Adria",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2025/07/25/d6152621b2-1-_3.webp"},
{nome:"M.Padilha",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2025/01/27/699974ac8a-1-.jpg"},
{nome:"Sara",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/09/04/9a6f4cec30-1-.jpg"},
{nome:"7 Saias",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/02/29/e43513a707-1-.jpg"},
{nome:"Odara",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/01/15/91bb2a4455-1-.jpg"}
]
};

const fixo=[
{

},
{

},
{

icone:"https://i.ibb.co/DHGtmnwZ/pppppppp.png",
lista:["Sulamita","Adria","M.Padilha","Sara","7 Saias","Odara"]
}
];

function buscar(nome){
  return [...banco.clareza,...banco.motivacao,...banco.esperanca]
  .find(c=>c.nome===nome);
}
// рџ”Ґ рџ‘‡ COLE AQUI
function clicarContratar(nome, imagem){
  localStorage.setItem('consultorNome', nome);
  localStorage.setItem('consultorImagem', imagem);
  window.location.href = "/aplicativo/perfil.html";
}
// рџџў CONTROLE DE ONLINE/OFFLINE (NOVO)

// рџ”Ґ AGENDA DOS CONSULTORES
const agenda = {
 "Pai MГЎrcio": { inicio: 10, fim: 22 },
  "Samya": { inicio: 10, fim: 22 },
  "Aislyn": { inicio: 12, fim: 20 },
  "Tulipa": { inicio: 10, fim: 17 },

  "Esmeralda": { inicio: 10, fim: 23 },
  "Thabata": { inicio: 11, fim: 19 },
  "Analu": { inicio: 10, fim: 21 },
  "Benedita": { inicio: 10, fim: 18 },

  "Estrela": { inicio: 10, fim: 22 },
  "Sulamita": { inicio: 13, fim: 21 },
  "Adria": { inicio: 10, fim: 19 },
  "M.Padilha": { inicio: 10, fim: 23 },
  "Sara": { inicio: 10, fim: 20 },
  "7 Saias": { inicio: 12, fim: 22 },
  "Odara": { inicio: 10, fim: 18 }
};

// рџ”Ґ CONTROLE REAL (CORRIGIDO E ESTГЃVEL)
let controleStatus = JSON.parse(localStorage.getItem("controleStatus")) || {};
// рџ‘‡ NOVO (CACHE GLOBAL)
statusCache = Object.create(null);
function statusConsultor(nome){

  const agora = new Date();
  const agoraMs = Date.now();
  const hora = agora.getHours();

  const a = agenda[nome];

  const dentroHorario = a && hora >= a.inicio && hora < a.fim;

  // рџ”Ґ inicializaГ§ГЈo inteligente
  if(!controleStatus[nome]){
    controleStatus[nome] = {
      online: dentroHorario ? Math.random() < 0.6 : false,
      mudouEm: agoraMs
    };
  }

  const estado = controleStatus[nome];

// рџ”ґ FORA DO EXPEDIENTE (BASEADO NO FIM DO EXPEDIENTE)
if(!a || hora < a.inicio || hora >= a.fim){

  let offlineDesde = new Date();

  // рџ”Ґ define o horГЎrio de saГ­da (fim do expediente)
  offlineDesde.setHours(a?.fim || 23, 0, 0, 0);

  // рџ”Ґ se ainda nГЈo chegou no fim hoje в†’ usa o de ontem
  if(agora < offlineDesde){
    offlineDesde.setDate(offlineDesde.getDate() - 1);
  }

  const minutosOffline = Math.floor((agoraMs - offlineDesde.getTime()) / 60000);

  return {
    online: false,
    tempo: minutosOffline
  };
}
// вЏё PAUSA (CORRIGIDO E COM TEMPO REAL)
if(a && a.pausa && hora >= a.pausa[0] && hora < a.pausa[1]){

  // рџ”Ґ forГ§a offline durante pausa
  if(estado.online){
    estado.online = false;
    estado.mudouEm = agoraMs;
  }

  // рџ”Ґ salva estado
  localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

  // рџ”Ґ calcula tempo desde inГ­cio da pausa
  let pausaInicio = new Date();
  pausaInicio.setHours(a.pausa[0], 0, 0, 0);

  const minutosOffline = Math.floor((agoraMs - pausaInicio.getTime()) / 60000);

  return {
    online:false,
    tempo:minutosOffline
  };
}
// рџ”Ґ TROCA INTELIGENTE (COM TEMPO MГЌNIMO)
const tempoMinimo = 3 + Math.floor(Math.random()*3); 
// entre 3 e 5 minutos

if(agoraMs - estado.mudouEm > tempoMinimo * 60000){

  if(Math.random() < 0.3){
    estado.online = !estado.online;
    estado.mudouEm = agoraMs;
  }

}
// рџ”Ґ salva sempre
localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

const minutosPassados = Math.floor((agoraMs - estado.mudouEm)/60000);

// рџ”Ґ RESET DO CONTADOR OFFLINE (AQUI рџ‘‡)
if(estado.online){
  estado.offlineDesde = null;
}
// рџџў ONLINE в†’ FILA REAL
if(estado.online){

  // рџ”Ґ quantidade de pessoas na fila (1 a 4)
  const fila = Math.floor(Math.random()*4)+1;

  // рџ”Ґ tempo base por pessoa (5 a 10 minutos)
  const tempoBase = 5 + Math.floor(Math.random()*6);

  // рџ”Ґ tempo total de espera
  const tempoFila = fila * tempoBase;

  return { 
    online:true, 
    tempo:tempoFila,
    fila:fila
  };
}

// рџ”ґ OFFLINE в†’ TEMPO REAL
return { online:false, tempo:minutosPassados };
}
// рџ‘‡ COLE AQUI
function getStatus(nome){
  if(!statusCache[nome]){
    statusCache[nome] = statusConsultor(nome);
  }
  return statusCache[nome];
}
// вЏ± FORMATAR TEMPO
function formatarTempo(min){

  if(min >= 60){
    const h = Math.floor(min/60);
    const m = min % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  return min + " min";
}

// рџ‘Ґ PESSOAS
function pessoas(){
  return Math.floor(Math.random()*53)+20;
}
// рџ”Ґ CARD
function card(c){

const status = getStatus(c.nome);
const online = status.online;
const tempoTxt = formatarTempo(status.tempo);

return `
<a class="card"
data-online="${online}"
onclick="
const online = this.getAttribute('data-online') === 'true';

</a>`;
}

function renderDestaque(){

const semana=Math.floor(Date.now()/604800000);
const c=todos[semana % todos.length];

const status = getStatus(c.nome);
const online = status.online;

// рџ”Ґ SINCRONIZA A BOLINHA (NOVO)
const foto = document.querySelector(".foto-destaque");

if(foto){

  if(online){

    if(!foto.querySelector(".online")){
      const bolinha = document.createElement("div");
      bolinha.className = "online";
      foto.appendChild(bolinha);

<script>

// рџ”Ґ LISTA TOTAL
function todosConsultores(){
  return [
    ...banco.clareza,
    ...banco.motivacao,
    ...banco.esperanca
  ];
}

// рџ”Ґ PEGA CONSULTORES NO HORГЃRIO (SEM BUG)
function consultoresOcupados(){

  const hora = new Date().getHours();

  return todosConsultores().filter(c => {

    const a = agenda[c.nome];
    if(!a) return false;

    // вњ… dentro do horГЎrio
    const dentroHorario = hora >= a.inicio && hora < a.fim;

    if(!dentroHorario) return false;

    // вњ… pega status REAL (igual ao card)
    const status = getStatus(c.nome);

    // вњ… regra principal
    return status && status.online === false;

  });

}
// рџ”Ґ MOSTRAR POPUP (BLINDADO)
function mostrarPopup(){

  const hora = new Date().getHours();

  const ocupados = consultoresOcupados();

  // рџ”Ґ BLOQUEIO INTELIGENTE (madrugada)
  if(hora >= 2 && hora < 10 && ocupados.length === 0){
    agendarPopup();
    return;
  }

  // рџ”Ґ se nГЈo tiver ninguГ©m no horГЎrio в†’ tenta de novo
  if(ocupados.length === 0){
    agendarPopup();
    return;
  }

  let random = ocupados[Math.floor(Math.random() * ocupados.length)];

  const popup = document.getElementById("popupOcupado");

  if(!popup){
    agendarPopup();
    return;
  }

  // рџ”Ґ mensagem (SEM depender de online/offline)
  popup.innerText = `рџ’¬ ${random.nome} estГЎ em atendimento`;

  // рџ”Ґ reset
  popup.style.display = "block";
  popup.style.opacity = "0";
  popup.style.transform = "translateX(-50%) translateY(20px)";
  popup.style.transition = "none";

  // рџ”Ґ entrada
  setTimeout(()=>{
    popup.style.transition = "0.3s";
    popup.style.opacity = "1";
    popup.style.transform = "translateX(-50%) translateY(0)";
  },50);

  // рџ”Ґ saГ­da
  setTimeout(()=>{
    popup.style.opacity = "0";
    popup.style.transform = "translateX(-50%) translateY(20px)";

    setTimeout(()=>{
      popup.style.display = "none";
      agendarPopup();
    },300);

  },3000);
}

// рџ”Ґ LOOP ESTГЃVEL (NГѓO TRAVA)
function agendarPopup(){
  const tempo = Math.random() * 4000 + 3000; // 3s a 7s
  setTimeout(() => {
    mostrarPopup();
  }, tempo);
}

// рџ”Ґ START GARANTIDO (ESPERA O PWA PRIMEIRO)
setTimeout(() => {

  const pwa = document.getElementById("pwaPopup");

  // рџ”Ґ se o popup de instalaГ§ГЈo estiver aberto, espera fechar
  if(pwa && pwa.style.display === "flex"){

    const check = setInterval(() => {
      if(pwa.style.display === "none"){
        clearInterval(check);
        mostrarPopup();
      }
    }, 500);

  } else {
    mostrarPopup();
  }

}, 6000);
