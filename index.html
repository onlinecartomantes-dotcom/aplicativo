<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<!-- Fonte Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- 🔥 PWA (INSTALAÇÃO COMO APP) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins', sans-serif;

  /* 🔥 FUNDO MAIS BONITO E SUAVE */
  background: linear-gradient(180deg, #fffdf5 0%, #fff4cc 40%, #ffe8a3 100%);
  background-attachment: fixed;

  overflow-x:hidden;

  max-width:500px;  /* 👈 mantém */
  margin:auto;      /* 👈 mantém */
}

/* TOPO */
.topo-novo{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
}

/* 🔥 TODAS AS IMAGENS IGUAIS */
.topo-novo img{
  width:15vw;
  height:15vw;
  max-width:80px;
  max-height:80px;

  border-radius:0;
  box-shadow:none;
  background:none;
}
/* só posiciona a da direita */
.logo-direita{
  margin-left:auto;
}
.ola{
  font-size:32px;
  font-weight:600;
  color:#000;
}
/* BOX */
.box{
background:#fff;
margin:15px;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* OPÇÕES */
.opcoes{
  display:flex;
  gap:10px;
  margin-top:5px;

  overflow-x:hidden; /* ✅ padrão SEM scroll */
  scroll-behavior:smooth;
  justify-content:space-between;

  /* 👇 esconder barra de rolagem */
  scrollbar-width:none; /* Firefox */
}

.opcoes::-webkit-scrollbar{
  display:none; /* Chrome, Safari, Instagram */
}

.op{
  flex:1;              /* ✅ divide espaço no Chrome/Safari */
  min-width:0;         /* ✅ evita quebrar no Safari */
  padding:12px 6px;
  border-radius:16px;
  border:2px solid #e6c068;
  text-align:center;
  color:#b8860b;
  font-weight:bold;
  cursor:pointer;
  background:#f7f1e3;
  white-space:nowrap; /* evita quebrar texto */
}

.op img{
  width:34px;
  height:34px;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

/* 👇 SOMENTE INSTAGRAM / FACEBOOK (volta o scroll) */
.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}

.op.active{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#fff;
}
.op.active img{
  filter: brightness(0) invert(1);
}
/* TITULOS */
.titulo{
margin:12px 15px 6px;
font-weight:700;
font-size:18px;
color:#333;
display:flex;
align-items:center;
gap:12px;
}

.titulo img{
width:40px;
}

/* SCROLL */
.scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px 15px;
scroll-snap-type:x mandatory;
}

.scroll::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
flex:0 0 auto;
width:80%;
max-width:300px;
min-height:150px;
border-radius:20px;
padding:16px 10px;
position:relative;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
scroll-snap-align:center;
overflow:hidden;
text-align:center;

/* 🔥 CORREÇÃO DO LINK */
display:block;
text-decoration:none;
color:inherit;
}

/* 🔥 REMOVE AZUL E SUBLINHADO DE TUDO */
.card{
text-decoration:none;
color:inherit;
}
/* 🔥 EFEITO DE CLIQUE (OPCIONAL TOP) */
.card:active{
transform:scale(0.98);
}

/* 🔥 BASE DO CARD (IMPORTANTE) */
.card{
  position:relative;
}

/* 🔥 FUNDO DO CARD */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('https://i.ibb.co/yBnPKpsp/Whats-App-Image-2026-04-07-at-22-40-41.jpg');
  background-size:cover;
  background-position:center;
  opacity:0.5;
  z-index:0; /* fica atrás */
}

/* 🔥 CONTEÚDO SEMPRE NA FRENTE */
.card *{
  position:relative;
  z-index:1;
}
/* ⏰ TEMPO (PEQUENO, LIMPO E RESPONSIVO) */
.tempo{
  position:absolute;
  top:8px;
  left:2px;   /* 🔥 mais pra esquerda */

  display:inline-flex;
  align-items:center;
  gap:4px;

  background:#fff3cd;
  color:#b8860b;
  font-size:10px;
  font-weight:bold;
  padding:4px 8px;
  border-radius:15px;

  z-index:999;
  max-width:70%;
}
/* 🔥 ícone menor */
.tempo svg{
  width:12px;
  height:12px;
}

/* FOTO */
.foto{
  width:30vw;
  height:30vw;
  max-width:140px;
  max-height:140px;
  margin:auto;
  margin-top:5px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}

.foto img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}
/* 🟢 ONLINE PISCANDO */
.online{
  position:absolute;
  top:4px;
  right:4px;
  width:15px;
  height:15px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.4);opacity:0.5;}
100%{transform:scale(1);opacity:1;}
}

/* TEXTO CENTRAL */
.nome,.desc,.foot{
text-align:center;
}

.nome{
  margin-top:15px; /* mais próximo da foto */
  font-weight:600;
   font-size:clamp(18px, 5vw, 26px);
  color:#333;
}

.desc{
  font-size:clamp(14px, 4vw, 18px);
  color:#c47a00; /* voltou para o dourado/amarelo */
  margin-top:8px;
}

.foot{
  font-size:13px;
  margin-top:15px;
  background:rgba(255, 215, 0, 0.5); /* amarelo com transparência */
  border-radius:20px;
  padding:8px;
  font-weight:500;
}

/* 👇 PARTE 7 (IMPORTANTE) */
img{
  max-width:100%;
  height:auto;
}

*{
  word-wrap:break-word;
}

.app-view .opcoes{
  overflow-x:auto;
  justify-content:flex-start;
}

.app-view .op{
  flex:0 0 auto;
  min-width:120px;
  padding:14px 10px;
}

/* 🔥 CARD DESTAQUE (PADRÃO DOS CARDS) */
.card-destaque{
  background:#fff;
  margin:15px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
}

.card-destaque::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('...');
  background-size:cover;
  background-position:center;
  opacity:0.5;
}

.card-destaque *{
  position:relative;
  z-index:2;
}

/* 🔥 TOPO CORRIGIDO (ESSA É A CHAVE) */
.topo-destaque{
  display:flex;
  gap:12px;
  align-items:flex-start; /* 👈 CORREÇÃO AQUI */
}

/* 🔥 LIBERA O BLOCO DE TEXTO */
.card-destaque .topo-destaque > div{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* 🔥 FOTO IGUAL AOS CARDS */
.foto-destaque{
  width:100px;
  height:100px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(45deg,#e6c068,#b8860b);
  position:relative;
}

.foto-destaque img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* 🔥 ONLINE */
.foto-destaque .online{
  position:absolute;
  top:4px;
  right:4px;
  width:14px;
  height:14px;
  background:#00cc66;
  border-radius:50%;
  border:2px solid #fff;
  box-shadow:0 0 4px rgba(0,204,102,0.5);
  animation:pulse 1.2s infinite;
}

/* 🔥 BADGE */
.badge{
  background:linear-gradient(45deg,#ffd700,#e6c068);
  color:#000;
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  display:inline-block;
}

/* 🔥 NOME (AGORA DESCE DE VERDADE) */
.card-destaque .nome-destaque{
  display:block;
  margin-top:5px; /* 👈 AGORA FUNCIONA DE VERDADE */
  font-weight:600;
  font-size:clamp(18px, 5vw, 26px);
  color:#333;
}

/* 🔥 SUB */
.sub{
  font-size:clamp(14px, 4vw, 18px);
  color:#c47a00;
  margin-top:12px;
}

/* 🔥 INFO */
.info{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* 🔥 PESSOAS */
#pessoasSemana{
  background:rgba(255, 215, 0, 0.5);
  padding:8px;
  border-radius:20px;
  font-size:13px;
}

/* 🔥 TEMPO */
#tempoSemana{
  display:flex;
  align-items:center;
  gap:6px;
  background:#fff3cd;
  color:#b8860b;
  font-size:11px;
  font-weight:bold;
  padding:5px 10px;
  border-radius:20px;
}

#tempoSemana svg{
  width:14px;
  height:14px;
  stroke:#b8860b;
}

/* 🔥 TEXTO */
.texto{
  margin-top:15px;
  font-size:14px;
  color:#555;
}

/* 🔥 BOTÃO */
.btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00bfa6,#1abc9c);
  color:#fff;
  font-size:18px;
  font-weight:600;
}

/* 🔥 CARD OFERTA (NOVO MODELO) */
.card-oferta{
  flex:0 0 auto;
  width:85%;
  max-width:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

/* 🔥 CONTAINER DA IMAGEM */
.img-box{
  position:relative;
}

/* IMAGEM */
.img-box img{
  width:100%;
  display:block;
  border-radius:20px;
}

/* 🔥 BOTÃO SOBRE A IMAGEM */
.btn-oferta{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);

  width:80%;
  padding:14px;
  border:none;
  border-radius:25px;

  background:linear-gradient(45deg,#00bfa6,#1abc9c);
  color:#fff;
  font-size:16px;
  font-weight:600;

  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

</style>
</head>
<body>

<div class="topo-novo">
  <img src="https://i.ibb.co/CpTCs8s9/Design-sem-nome-removebg-preview.png">
  <span class="ola">Olá :)</span>
  <!-- NOVA IMAGEM -->
  <img class="logo-direita" src="https://i.ibb.co/FqhZTCZg/logo-192-removebg-preview.png">
</div>

<div class="box">
<div class="titulo">O que está procurando?</div><div class="opcoes">
<div class="op active" onclick="trocar('clareza',this)">
<img src="https://i.ibb.co/TMVkVXN6/pp.png">Clareza
</div>

<div class="op" onclick="trocar('motivacao',this)">
<img src="https://i.ibb.co/8Dhz1WFw/image.png">Motivação
</div>

<div class="op" onclick="trocar('esperanca',this)">
<img src="https://i.ibb.co/ccP46cMj/kkkkk.png">Esperança
</div>
</div>
</div>
<div id="principal"></div>
<div id="fixo"></div>
<script>
const banco={
clareza:[
{nome:"Pai Márcio",img:"https://i.ibb.co/RGZzCfFC/Captura-de-tela-2026-04-02-001847.png"},
{nome:"Samya",img:"https://i.ibb.co/m570rCkG/Whats-App-Image-2026-04-03-at-22-36-29-1.jpg"},
{nome:"Aislyn",img:"https://i.ibb.co/5WtRK6mQ/Whats-App-Image-2026-04-03-at-22-36-29-2.jpg"},
{nome:"Tulipa",img:"https://i.ibb.co/0pNhf839/Whats-App-Image-2026-04-03-at-22-36-29.jpg"}
],
motivacao:[
{nome:"Esmeralda",img:"https://i.ibb.co/8LMGQ4s9/Chat-GPT-Image-7-04-2026-07-47-54.png"},
{nome:"Thabata",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2025/06/28/d5969655ef-1-_3.webp"},
{nome:"Analu",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2025/12/19/fe3f4b6a8a-1-_3.webp"},
{nome:"Benedita",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2025/10/23/9f9ffa4ba9-1-_3.webp"}
],
esperanca:[
{nome:"Estrela",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2026/01/01/b2a24fc4f7-1-_3.webp"},
{nome:"Sulamita",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/05/27/47a447851c-1-.jpg"},
{nome:"Adria",img:"https://www.mestresmisticos.com.br/Assets/Imagens/2025/07/25/d6152621b2-1-_3.webp"},
{nome:"M.Padilha",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2025/01/27/699974ac8a-1-.jpg"},
{nome:"Sara",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/09/04/9a6f4cec30-1-.jpg"},
{nome:"7 Saias",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/02/29/e43513a707-1-.jpg"},
{nome:"Odara",img:"https://www.rainhasdotarot.com.br/Assets/Imagens/2024/01/15/91bb2a4455-1-.jpg"}
]
};

const fixo=[
{
titulo:"Nós temos um futuro juntos?",
icone:"https://i.ibb.co/tw8wF0JD/ppp.png",
lista:["Esmeralda","M.Padilha","Thabata"]
},
{
titulo:"Tem interesse em mim?",
icone:"https://i.ibb.co/gLMsV9kQ/ppppp.png",
lista:["Analu","Benedita","Estrela"]
},
{
titulo:"Como atrair o amor?",
icone:"https://i.ibb.co/DHGtmnwZ/pppppppp.png",
lista:["Sulamita","Adria","M.Padilha","Sara","7 Saias","Odara"]
}
];

function buscar(nome){
  return [...banco.clareza,...banco.motivacao,...banco.esperanca]
  .find(c=>c.nome===nome);
}
// 🟢 CONTROLE DE ONLINE/OFFLINE (NOVO)

// 🔥 AGENDA DOS CONSULTORES
const agenda = {
 "Pai Márcio": { inicio: 10, fim: 22 },
  "Samya": { inicio: 10, fim: 22 },
  "Aislyn": { inicio: 12, fim: 20 },
  "Tulipa": { inicio: 10, fim: 17 },

  "Esmeralda": { inicio: 10, fim: 23 },
  "Thabata": { inicio: 11, fim: 19 },
  "Analu": { inicio: 10, fim: 21 },
  "Benedita": { inicio: 10, fim: 18 },

  "Estrela": { inicio: 10, fim: 22 },
  "Sulamita": { inicio: 13, fim: 21 },
  "Adria": { inicio: 10, fim: 19 },
  "M.Padilha": { inicio: 10, fim: 23 },
  "Sara": { inicio: 10, fim: 20 },
  "7 Saias": { inicio: 12, fim: 22 },
  "Odara": { inicio: 10, fim: 18 }
};

// 🔥 CONTROLE REAL (CORRIGIDO E ESTÁVEL)
let controleStatus = JSON.parse(localStorage.getItem("controleStatus")) || {};
// 👇 NOVO (CACHE GLOBAL)
statusCache = Object.create(null);
function statusConsultor(nome){

  const agora = new Date();
  const agoraMs = Date.now();
  const hora = agora.getHours();

  const a = agenda[nome];

  const dentroHorario = a && hora >= a.inicio && hora < a.fim;

  // 🔥 inicialização inteligente
  if(!controleStatus[nome]){
    controleStatus[nome] = {
      online: dentroHorario ? Math.random() < 0.6 : false,
      mudouEm: agoraMs
    };
  }

  const estado = controleStatus[nome];

// 🔴 FORA DO EXPEDIENTE (CORRIGIDO - TEMPO REAL CERTO)
if(!a || hora < a.inicio || hora >= a.fim){

  // 🔥 usa o INÍCIO do expediente (não fechamento)
  let inicioHoje = new Date();
  inicioHoje.setHours(a?.inicio || 10, 0, 0, 0);

  // 🔥 se ainda não chegou no horário de início → continua hoje mesmo
  if(agora < inicioHoje){
    inicioHoje.setDate(inicioHoje.getDate());
  }

  const minutosOffline = Math.floor((agoraMs - inicioHoje.getTime()) / 60000);

  return {
    online: false,
    tempo: minutosOffline
  };
}


// ⏸ PAUSA (CORRIGIDO E COM TEMPO REAL)
if(a && a.pausa && hora >= a.pausa[0] && hora < a.pausa[1]){

  // 🔥 força offline durante pausa
  if(estado.online){
    estado.online = false;
    estado.mudouEm = agoraMs;
  }

  // 🔥 salva estado
  localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

  // 🔥 calcula tempo desde início da pausa
  let pausaInicio = new Date();
  pausaInicio.setHours(a.pausa[0], 0, 0, 0);

  const minutosOffline = Math.floor((agoraMs - pausaInicio.getTime()) / 60000);

  return {
    online:false,
    tempo:minutosOffline
  };
}
// 🔥 TROCA INTELIGENTE (COM TEMPO MÍNIMO)
const tempoMinimo = 3 + Math.floor(Math.random()*3); 
// entre 3 e 5 minutos

if(agoraMs - estado.mudouEm > tempoMinimo * 60000){

  if(Math.random() < 0.3){
    estado.online = !estado.online;
    estado.mudouEm = agoraMs;
  }

}
// 🔥 salva sempre
localStorage.setItem("controleStatus", JSON.stringify(controleStatus));

const minutosPassados = Math.floor((agoraMs - estado.mudouEm)/60000);

// 🟢 ONLINE → FILA REAL
if(estado.online){

  // 🔥 quantidade de pessoas na fila (1 a 4)
  const fila = Math.floor(Math.random()*4)+1;

  // 🔥 tempo base por pessoa (5 a 10 minutos)
  const tempoBase = 5 + Math.floor(Math.random()*6);

  // 🔥 tempo total de espera
  const tempoFila = fila * tempoBase;

  return { 
    online:true, 
    tempo:tempoFila,
    fila:fila
  };
}

// 🔴 OFFLINE → TEMPO REAL
return { online:false, tempo:minutosPassados };
}
// 👇 COLE AQUI
function getStatus(nome){
  if(!statusCache[nome]){
    statusCache[nome] = statusConsultor(nome);
  }
  return statusCache[nome];
}
// ⏱ FORMATAR TEMPO
function formatarTempo(min){

  if(min >= 60){
    const h = Math.floor(min/60);
    const m = min % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  return min + " min";
}

// 👥 PESSOAS
function pessoas(){
  return Math.floor(Math.random()*53)+20;
}
// 🔥 CARD
function card(c){

const status = getStatus(c.nome);
const online = status.online;
const tempoTxt = formatarTempo(status.tempo);

return `
<a class="card"
data-online="${online}"
onclick="
const online = this.getAttribute('data-online') === 'true';
abrirPerfil('${c.nome}','${c.img}', online);
"
href="javascript:void(0)">
<div class="tempo">
  <svg viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="2">
    <circle cx="12" cy="12" r="9"></circle>
    <path d="M12 7v5l3 2"></path>
  </svg>
  <span>
    ${
     "≈ " + tempoTxt
    }
  </span>
</div>

<div class="foto">
<img src="${c.img}">
${online ? '<div class="online"></div>' : ''}
</div>

<div class="nome">${c.nome}</div>

<div class="desc">
${
  online
  ? "Estou Disponível"
  : "Indisponível • offline há " + tempoTxt
}
</div>

<div class="foot">${pessoas()} pessoas ajudadas/90 dias</div>

</a>`;
}
// 🔥 RENDER PRINCIPAL
function renderPrincipal(tipo){

const icones={
clareza:"https://i.ibb.co/TMVkVXN6/pp.png",
motivacao:"https://i.ibb.co/8Dhz1WFw/image.png",
esperanca:"https://i.ibb.co/ccP46cMj/kkkkk.png"
};

const titulos={
clareza:"Estou no caminho correto?",
motivacao:"Qual é minha missão?",
esperanca:"Terei um futuro melhor?"
};

let html=`
<div class="titulo">
<img src="${icones[tipo]}">
${titulos[tipo]}
</div>
<div class="scroll">`;

banco[tipo].forEach(c=> html+=card(c));

html+=`</div>`;
document.getElementById("principal").innerHTML=html;

renderFixo();
}

// 🔥 FIXO
function renderFixo(){

let html="";

fixo.forEach((sec,index)=>{

html+=`
<div class="titulo">
<img src="${sec.icone}">
${sec.titulo}
</div>`;

html+=`<div class="scroll">`;

sec.lista.forEach(n=> html+=card(buscar(n)));

html+=`</div>`;

// 🔥 CARD DESTAQUE
if(index === 0){

  if(isIOS()){

    texto.innerHTML="Instale agora:";
    steps.innerHTML=`
    ✔ Acesso rápido<br>

    `;

    btn.innerText="INSTALAR AGORA";
    btn.onclick=()=>{

      popup.style.display="none";
    };
    return;
  }

  titulo.innerText="INSTALAR NO DISPOSITIVO";
  texto.innerHTML="Você pode instalar este site como aplicativo.";

  1. Use o menu<br>
  2. Adicionar à tela inicial
  `;

  btn.innerText="ENTENDI";
  btn.onclick=fecharPWA;
}

function todosConsultores(){
  return [
    ...banco.clareza,
    ...banco.motivacao,
    ...banco.esperanca
  ];
}

// 🔥 PEGA OCUPADOS
function consultoresOcupados(){
 return todosConsultores().filter(c => !getStatus(c.nome).online);
}
// 🔥 MOSTRAR POPUP
function mostrarPopup(){
// 🔥 BLOQUEIO DE HORÁRIO (2h às 10h)
const hora = new Date().getHours();

if(hora >= 2 && hora < 10){
  agendarPopup();
  return;
}
  const ocupados = consultoresOcupados();

  if(ocupados.length === 0){
    agendarPopup();
    return;
  }

  let random = ocupados[Math.floor(Math.random() * ocupados.length)];

// 🔥 VERIFICA SE TEM BOLINHA NO CARD (NA TELA)
const cards = document.querySelectorAll(".card");

let estaComBolinha = false;

cards.forEach(card => {
  const nome = card.querySelector(".nome")?.innerText;

  if(nome === random.nome && card.querySelector(".online")){
    estaComBolinha = true;
  }
});

// 🔥 DUPLA VERIFICAÇÃO (LÓGICA + TELA)
const status = getStatus(random.nome);

// 🔥 se estiver online OU já aparece online na tela → não mostra popup
if(status.online || estaComBolinha){
  agendarPopup();
  return;
}

const popup = document.getElementById("popupOcupado");

// 🔥 segurança extra
if(!popup){
  agendarPopup();
  return;
}

// 🔥 mensagem
popup.innerText = `💬 ${random.nome} está em atendimento`;

// 🔥 reset visual
popup.style.display = "block";
popup.style.opacity = "0";
popup.style.transform = "translateX(-50%) translateY(20px)";
popup.style.transition = "none";

// 🔥 anima entrada
setTimeout(()=>{
  popup.style.transition = "0.3s";
  popup.style.opacity = "1";
  popup.style.transform = "translateX(-50%) translateY(0)";
},50);

// 🔥 anima saída
setTimeout(()=>{
  popup.style.opacity = "0";
  popup.style.transform = "translateX(-50%) translateY(20px)";

  setTimeout(()=>{
    popup.style.display = "none";
    agendarPopup();
  },300);

},3000);
}
// 🔥 TEMPO ALEATÓRIO
function agendarPopup(){
  const tempo = Math.random() * 5000 + 4000;
  setTimeout(mostrarPopup, tempo);
}

// 🔥 INICIA
setTimeout(agendarPopup, 3000);
