<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff;
max-width:500px;
margin:auto;
color:#222;
}

.foto{
width:140px;
height:140px;
margin:30px auto 10px;
border-radius:50%;
padding:4px;
background:linear-gradient(45deg,#e6c068,#b8860b);
position:relative;
}

.foto img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

.online{
position:absolute;
top:6px;
right:6px;
width:16px;
height:16px;
background:#00cc66;
border-radius:50%;
border:2px solid #fff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

.nome{text-align:center;font-size:24px;font-weight:700;}
.estrelas{text-align:center;color:#ffd700;margin-top:5px;font-size:18px;}
.status{text-align:center;color:#00cc66;font-weight:600;margin-top:5px;}
.valor{text-align:center;margin-top:10px;font-weight:600;}

.box{
margin:20px;
padding:20px;
border-radius:20px;
background:#f7f7f7;
}

.sobre{
background:#fff8dc;
padding:15px;
border-radius:15px;
margin-bottom:20px;
border:1px solid #f1d27a;
}

.depo{
margin-top:10px;
font-size:14px;
padding:12px;
background:#fff8dc;
border-radius:12px;
border:1px solid #f1d27a;
}

.btn-fixo{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
padding:15px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00cc66,#00bfa6);
color:#fff;
font-size:18px;
font-weight:bold;
}

.espaco{height:90px;}

</style>
</head>
