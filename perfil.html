<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff;
max-width:500px;
margin:auto;
color:#222;
}

/* FOTO */
.foto{
width:140px;
height:140px;
margin:30px auto 10px;
border-radius:50%;
padding:4px;
background:linear-gradient(45deg,#e6c068,#b8860b);
position:relative;
}

.foto img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

.online{
position:absolute;
top:6px;
right:6px;
width:16px;
height:16px;
background:#00cc66;
border-radius:50%;
border:2px solid #fff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

/* TEXTO */
.nome{
text-align:center;
font-size:24px;
font-weight:700;
}

.estrelas{
text-align:center;
color:#ffd700;
margin-top:5px;
font-size:18px;
}

.status{
text-align:center;
color:#00cc66;
font-weight:600;
margin-top:5px;
}

.valor{
text-align:center;
margin-top:10px;
font-weight:600;
}

/* BOX */
.box{
margin:20px;
padding:20px;
border-radius:20px;
background:#f7f7f7;
}

/* SOBRE */
.sobre{
background:#fff8dc;
padding:15px;
border-radius:15px;
margin-bottom:20px;
border:1px solid #f1d27a;
}

/* DEPOIMENTOS */
.depo{
margin-top:10px;
font-size:14px;
color:#333;
padding:12px;
background:#fff8dc;
border-radius:12px;
border:1px solid #f1d27a;
}

/* BOTÃO */
.btn-fixo{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
padding:15px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00cc66,#00bfa6);
color:#fff;
font-size:18px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ESPAÇO */
.espaco{
height:90px;
}

</style>
</head>

<body>

<div class="foto">
<img id="foto">
<div class="online"></div>
</div>

<div class="nome" id="nome"></div>
<div class="estrelas" id="estrelas"></div>
<div class="status">Online agora</div>
<div class="valor">R$1,99/min</div>

<div class="box">

<div class="sobre">
<b>Sobre mim</b><br><br>

<div id="especialidade"></div><br>
<div id="signos"></div><br>

<div id="descricao"></div>

</div>

<b>Depoimentos reais</b>

<div id="depoimentos"></div>

</div>

<div class="espaco"></div>

<button class="btn-fixo">Conecte-se Comigo</button>

<script>

// DADOS
const nome = localStorage.getItem("consultorNome");
const foto = localStorage.getItem("consultorImagem");

if(!nome || !foto){
document.body.innerHTML="Erro ao carregar consultor";
}

// FOTO
document.getElementById("nome").innerText = nome;
document.getElementById("foto").src = foto;

// ESTRELAS
function estrelas(){
let qtd = Math.floor(Math.random()*2)+4;
return "★".repeat(qtd) + "☆".repeat(5-qtd);
}
document.getElementById("estrelas").innerText = estrelas();

// SIGNOS
const signos = [
"♈ Áries","♉ Touro","♊ Gêmeos","♋ Câncer",
"♌ Leão","♍ Virgem","♎ Libra"
];

function getSigno(){
return signos[Math.floor(Math.random()*signos.length)];
}

document.getElementById("signos").innerText =
"Sol " + getSigno() + " | Asc " + getSigno();

// ESPECIALIDADE
document.getElementById("especialidade").innerText =
"🔮 Amor • Relacionamentos • Espiritualidade";

// DESCRIÇÕES
const descricoesPorConsultor = {

"Pai Márcio":"Sou especialista em espiritualidade profunda, com respostas diretas e seguras.",

"Samya":"Sou sensitiva e acolhedora, trazendo clareza emocional e respostas verdadeiras.",

"Esmeralda":"Especialista em amor e sentimentos, revelo intenções ocultas.",

"Aislyn":"Trabalho com energia espiritual e revelações profundas.",

"Tulipa":"Leituras sinceras e orientação emocional.",

"Thabata":"Ajudo você a entender sentimentos e decisões.",

"Analu":"Leituras detalhadas e diretas.",

"Benedita":"Orientação espiritual clara e objetiva.",

"Estrela":"Trago luz e clareza para sua vida.",

"Sulamita":"Especialista em reconciliação amorosa.",

"Adria":"Mostro caminhos verdadeiros.",

"M.Padilha":"Leituras diretas e espirituais.",

"Sara":"Orientação acolhedora e sincera.",

"7 Saias":"Revelações fortes e verdadeiras.",

"Odara":"Energia positiva e leve."
};

document.getElementById("descricao").innerText =
descricoesPorConsultor[nome] || "Estou aqui para te ajudar.";

// DEPOIMENTOS
const depoimentosPorConsultor = {

"Pai Márcio":[
"Acertou tudo com precisão.",
"Muito direto.",
"Me ajudou muito.",
"Excelente leitura.",
"Voltei várias vezes.",
"Recomendo muito.",
"Consulta forte.",
"Muito confiável.",
"Acerto impressionante.",
"Perfeito."
],

"Samya":[
"Muito acolhedora.",
"Leitura leve.",
"Me ajudou bastante.",
"Super recomendo.",
"Voltei várias vezes.",
"Incrível.",
"Muito verdadeira.",
"Gostei muito.",
"Excelente.",
"Perfeita."
]

};

let lista = depoimentosPorConsultor[nome] || [
"Excelente consulta.",
"Recomendo.",
"Muito bom.",
"Vale a pena.",
"Gostei bastante.",
"Volto sempre.",
"Perfeito.",
"Muito profissional.",
"Ótimo atendimento.",
"Experiência incrível."
];

let html="";
lista.forEach(d=>{
html += `<div class="depo">"${d}"</div>`;
});

document.getElementById("depoimentos").innerHTML = html;

// BOTÃO
document.querySelector(".btn-fixo").onclick = () => {
alert("Conectando com "+nome+"...");
};

</script>

</body>
</html>
