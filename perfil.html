<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff;
max-width:500px;
margin:auto;
}

/* FOTO */
.foto{
width:140px;
height:140px;
margin:30px auto 10px;
border-radius:50%;
padding:4px;
background:linear-gradient(45deg,#e6c068,#b8860b);
position:relative;
}

.foto img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

/* ONLINE */
.online{
position:absolute;
top:6px;
right:6px;
width:16px;
height:16px;
background:#00cc66;
border-radius:50%;
border:2px solid #fff;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

.nome{
text-align:center;
font-size:22px;
font-weight:600;
}

.estrelas{
text-align:center;
color:#ffd700;
margin-top:5px;
}

.status{
text-align:center;
color:#00cc66;
font-weight:600;
margin-top:5px;
}

.valor{
text-align:center;
margin-top:10px;
font-weight:600;
}

/* BADGES */
.badges{
text-align:center;
margin-top:10px;
font-size:13px;
color:#b8860b;
}

/* BOX */
.box{
margin:20px;
padding:20px;
border-radius:20px;
background:#f9f9f9;
}

/* DEPOIMENTOS */
.depo{
margin-top:10px;
font-size:13px;
color:#444;
padding:10px;
background:#fff;
border-radius:10px;
margin-bottom:8px;
}

/* BOTÃO */
.btn-fixo{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
padding:15px;
border:none;
border-radius:30px;
background:#00cc66;
color:#fff;
font-size:18px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="foto">
<img id="foto">
<div class="online"></div>
</div>

<div class="nome" id="nome"></div>
<div class="estrelas" id="estrelas"></div>
<div class="status">Online</div>
<div class="valor">Valor por minuto R$1,99</div>

<div class="badges" id="ranking"></div>

<div class="box">

<b>Sobre mim</b><br><br>

<div id="especialidade"></div><br>
<div id="signos"></div><br>

🕒 Disponibilidade de horários flexíveis<br><br>

<div id="descricao"></div>

<br><br>
<b>Depoimentos</b>

<div id="depoimentos"></div>

</div>

<button class="btn-fixo">Conecte-se Comigo</button>

<script>

// 🔥 DADOS
const nome = localStorage.getItem("consultorNome");
const foto = localStorage.getItem("consultorImagem");

document.getElementById("nome").innerText = nome;
document.getElementById("foto").src = foto;


// ⭐ AVALIAÇÃO DIFERENTE
function estrelas(){
let qtd = Math.floor(Math.random()*2)+4; // 4 ou 5
return "★".repeat(qtd) + "☆".repeat(5-qtd);
}
document.getElementById("estrelas").innerText = estrelas();


// 🔥 RANKING
const rankings = [
"🔥 Consultor Top",
"⭐ Muito Procurado",
"💎 Alta Reputação",
"👁️ Mais Acessado"
];

document.getElementById("ranking").innerText =
rankings[Math.floor(Math.random()*rankings.length)];


// 🧿 ESPECIALIDADES POR CONSULTOR
const especialidades = {
"Pai Márcio":"Relacionamentos / Espiritualidade / Caminhos",
"Samya":"Amor / Energia / Intuição",
"Aislyn":"Destino / Revelações / Energia",
"Tulipa":"Amor / Autoconhecimento",
"Esmeralda":"Relacionamentos / Sentimentos",
"Thabata":"Emoções / Energia",
"Analu":"Clareza / Decisões",
"Benedita":"Espiritualidade / Direção",
"Estrela":"Luz / Energia / Caminhos",
"Sulamita":"Reconciliação / Amor",
"Adria":"Destino / Caminhos",
"M.Padilha":"Espiritualidade / Verdade",
"Sara":"Orientação / Amor",
"7 Saias":"Energia forte / Revelação",
"Odara":"Positividade / Caminho"
};

document.getElementById("especialidade").innerText =
especialidades[nome] || "Leituras espirituais completas";


// 🔮 SIGNOS
function signo(){
const signos=["Áries","Touro","Gêmeos","Câncer","Leão","Virgem","Libra"];
return signos[Math.floor(Math.random()*signos.length)];
}

if(nome==="Pai Márcio"){
document.getElementById("signos").innerText="☀️ Sol em Leão | ⬆️ Asc Virgem";
}else{
document.getElementById("signos").innerText=
"☀️ Sol " + signo() + " | ⬆️ Asc " + signo();
}


// 📜 DESCRIÇÕES INDIVIDUAIS
const descricoes = {
"Pai Márcio":"Sou tarólogo experiente e intuitivo, trabalho com espiritualidade profunda.",
"Samya":"Sou taróloga sensitiva e acolhedora.",
"Aislyn":"Trabalho com energia espiritual e intuição refinada.",
"Tulipa":"Sou sensitiva com leituras profundas.",
"Esmeralda":"Especialista em amor e sentimentos.",
"Thabata":"Trabalho com energia emocional.",
"Analu":"Leituras profundas e detalhadas.",
"Benedita":"Orientação espiritual sincera.",
"Estrela":"Energia elevada e luz.",
"Sulamita":"Reconciliação amorosa.",
"Adria":"Mostro caminhos verdadeiros.",
"M.Padilha":"Leituras diretas e espirituais.",
"Sara":"Orientação acolhedora.",
"7 Saias":"Energia forte e reveladora.",
"Odara":"Energia positiva e leve."
};

document.getElementById("descricao").innerText =
descricoes[nome] || "Estou aqui para te ajudar.";


// 💬 DEPOIMENTOS
const depoimentos = [
"Me ajudou muito, acerto impressionante!",
"Voltei várias vezes, muito bom!",
"Explicação clara e direta.",
"Excelente consulta, recomendo!",
"Sentiu tudo perfeitamente!"
];

let depoHTML="";
for(let i=0;i<3;i++){
depoHTML += `<div class="depo">"${depoimentos[Math.floor(Math.random()*depoimentos.length)]}"</div>`;
}

document.getElementById("depoimentos").innerHTML = depoHTML;

</script>

</body>
</html>
