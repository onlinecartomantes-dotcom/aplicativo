<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aguarde...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#fff8dc,#ffe58a,#ffd54f);
color:#3d2f00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.box{
max-width:420px;
width:100%;
background:#ffffff;
padding:35px 25px;
border-radius:22px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
border:2px solid #f4c430;
animation:subir .6s ease;
}

@keyframes subir{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.loader{
width:75px;
height:75px;
border:7px solid #ffe58a;
border-top:7px solid #d4af37;
border-radius:50%;
animation:gira 1s linear infinite;
margin:auto;
margin-bottom:25px;
}

@keyframes gira{
100%{
transform:rotate(360deg);
}
}

h1{
font-size:28px;
margin-bottom:12px;
color:#5a4300;
}

p{
font-size:16px;
line-height:1.6;
color:#6b5200;
}

small{
display:block;
margin-top:18px;
font-size:14px;
color:#8a6b00;
}

.barra{
width:100%;
height:10px;
background:#ffe58a;
border-radius:30px;
overflow:hidden;
margin-top:25px;
}

.progresso{
height:100%;
width:0%;
background:linear-gradient(90deg,#d4af37,#f4c430,#ffd700);
animation:carrega 4s linear infinite;
}

@keyframes carrega{
0%{width:0%;}
100%{width:100%;}
}

.status{
margin-top:18px;
font-weight:bold;
font-size:15px;
color:#5a4300;
}

</style>
</head>

<body>

<div class="box">

<div class="loader"></div>

<h1>Preparando Pagamento</h1>

<p id="msg">
Estamos conectando ao servidor seguro.<br>
Não feche esta página.
</p>

<div class="barra">
<div class="progresso"></div>
</div>

<div class="status" id="status">
Iniciando conexão...
</div>

<small>Isso pode levar alguns segundos.</small>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const valor = params.get("valor");
const descricao = params.get("descricao");

const destino =
`https://api-ovz6.onrender.com/?valor=${valor}&descricao=${descricao}`;

const msg = document.getElementById("msg");
const statusTxt = document.getElementById("status");

let tentativas = 0;

async function acordarRender(){

tentativas++;

msg.innerHTML =
`Conectando ao servidor...<br>Tentativa ${tentativas}`;

statusTxt.innerText = "Aguarde, preparando ambiente seguro...";

try{

await fetch("https://api-ovz6.onrender.com/",{
method:"GET",
mode:"no-cors"
});

statusTxt.innerText = "Servidor online! Redirecionando...";

setTimeout(()=>{
window.location.href = destino;
},1000);

}catch(e){

statusTxt.innerText = "Servidor iniciando...";

setTimeout(acordarRender,3000);

}

}

acordarRender();

</script>

</body>
</html>
